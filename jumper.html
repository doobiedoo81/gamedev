<script>

let currentPlayerId = null; let saveData = null; let leaderboardData = [];

async function fetchCloudData(username) {
    try {
        const doc = await db.collection("players").doc(username).get();
        if (doc.exists) return doc.data();
        else return { gems: 15000, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 };
    } catch (e) { return { gems: 15000, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 }; }
}
function syncToCloud() { if (currentPlayerId) db.collection("players").doc(currentPlayerId).set(saveData, { merge: true }); }
async function fetchLeaderboard() {
    try {
        const snap = await db.collection("players").orderBy("high_score", "desc").limit(5).get();
        leaderboardData = []; snap.forEach(doc => leaderboardData.push({ name: doc.id, score: doc.data().high_score || 0 }));
    } catch (e) {}
}

function attemptLogin() {
    let idInput = document.getElementById("player-id").value.trim().toLowerCase();
    if (idInput === "") return alert("Please enter a Player ID!");
    document.querySelector(".login-btn").style.display = "none"; document.getElementById("loading-text").style.display = "block";
    fetchCloudData(idInput).then(data => {
        currentPlayerId = idInput; saveData = data;
        fetchLeaderboard().then(() => {
            document.getElementById("login-overlay").style.display = "none";
            player.updateSkin(); state = "MENU";
        });
    });
}

const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
let frames = 0; let state = "LOGIN"; 

// --- Input Handling ---
function getMousePos(evt) {
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width; let scaleY = canvas.height / rect.height;
    let cx = evt.clientX || (evt.touches && evt.touches[0].clientX);
    let cy = evt.clientY || (evt.touches && evt.touches[0].clientY);
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}
canvas.addEventListener("pointerdown", (e) => {
    let pos = getMousePos(e); handleCanvasClick(pos.x, pos.y);
});
window.addEventListener("keydown", (e) => { if(e.code==="Space"||e.code==="ArrowUp") handleCanvasClick(-1,-1); }); 

function isBtn(mx, my, bx, by, bw, bh) { return mx >= bx && mx <= bx+bw && my >= by && my <= by+bh; }
function drawText(txt, x, y, size, col, align="center") { ctx.fillStyle=col; ctx.font=`bold ${size}px Arial`; ctx.textAlign=align; ctx.fillText(txt, x, y); }
function drawButton(x, y, w, h, text, col1, col2, txtCol="black", txtSize=20) {
    let grad = ctx.createLinearGradient(x, y, x, y+h); grad.addColorStop(0, col1); grad.addColorStop(1, col2);
    ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(x,y,w,h, 10); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 1; ctx.stroke();
    drawText(text, x+w/2, y+h/2+txtSize*0.35, txtSize, txtCol);
}

// --- Game Data (20 SKINS) ---
const SKINS = [
    { id: 0, name: "Squire", color: [150, 150, 160], rarity: "Starter" },
    { id: 1, name: "Forest", color: [50, 200, 80], rarity: "Common" },
    { id: 2, name: "Sand", color: [210, 180, 140], rarity: "Common" },
    { id: 3, name: "Ocean", color: [50, 150, 255], rarity: "Common" },
    { id: 4, name: "Sakura", color: [255, 180, 200], rarity: "Common" },
    { id: 5, name: "Slime", color: [100, 255, 50], rarity: "Common" },
    { id: 6, name: "Ash", color: [80, 80, 80], rarity: "Common" },
    { id: 7, name: "Amethyst", color: [150, 50, 255], rarity: "Rare" },

    { id: 14, name: "Solar", color: [255, 150, 0], rarity: "Epic" },

    { id: 17, name: "GALAXY", color: [20, 0, 50], rarity: "Legendary" },
    { id: 18, name: "ABYSSAL", color: [0, 255, 255], rarity: "Legendary" },

];
const RARITY_COLORS = { "Starter": "#9696a0", "Common": "#aaaaaa", "Rare": "#00ffff", "Epic": "#ff3232", "Legendary": "#ffd700" };
const SHARD_PRICES = { "Common": 300, "Rare": 800, "Epic": 2000, "Legendary": 5000 };
const SHARD_TIERS = ["Common", "Rare", "Epic", "Legendary"];

// Globals
let platforms=[], gems=[], hazards=[], pads=[], orbs=[], particles=[], bg_props=[];
let camera_x=0, last_plat_x=900, last_plat_y=400, distance=0, game_speed=5;
let gacha_target=null, gacha_timer=0, gacha_msg="", shard_reward=0, showBanner=true, vault_sel=0, shard_sel=0;
let gacha_return_state = "GACHA_MENU";

function rand(min, max) { return Math.random() * (max - min) + min; }
function AABB(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

// --- VFX Engine ---
class Particle {
    constructor(x, y, color, type="normal") {
        this.x=x; this.y=y; this.color=color; this.type=type; this.life=255; this.size=4;
        if(type==="dust"){ this.dx=rand(-1,1); this.dy=rand(-2,0); this.life=150; this.size=rand(2,4); }
        else if(type==="fire"){ this.dx=rand(-2,2); this.dy=rand(-5,-2); this.life=200; this.size=rand(3,8); }
        else if(type==="dash"){ this.dx=rand(-8,-4); this.dy=rand(-2,2); this.life=255; this.size=6; }
        else if(type==="dragon"){ this.dx=rand(-6,-3); this.dy=rand(-1,1); this.life=255; this.size=8; }
        else if(type==="bubble"||type==="leaf"||type==="snow"){ this.dx=rand(-2,2); this.dy=rand(-1,2); this.life=200; this.size=rand(2,5); }
        else if(type==="shockwave"){ this.dx=0; this.dy=0; this.life=255; this.radius=5; }
        else if(type==="star"){ this.dx=rand(-4,4); this.dy=rand(-4,4); this.life=255; this.size=rand(2,5); }
        else{ let a=rand(0,Math.PI*2); let s=rand(2,6); this.dx=Math.cos(a)*s; this.dy=Math.sin(a)*s; }
    }
    update() {
        this.x+=this.dx; this.y+=this.dy;
        if(this.type==="fire"||this.type==="dragon"){ this.life-=10; this.size=Math.max(0.1,this.size-0.1); }
        else if(this.type==="bubble"||this.type==="leaf"||this.type==="snow"){ this.life-=8; this.x+=Math.sin(frames*0.1)*2; }
        else if(this.type==="shockwave"){ this.life-=10; this.radius+=5; } 
        else if(this.type==="star"){ this.life-=5; this.size=Math.max(0.1,this.size-0.05); }
        else this.life-=10;
    }
    draw(ctx) {
        if(this.life<=0)return; ctx.save();
        if(this.type==="shockwave"){
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.strokeStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.lineWidth=3; ctx.stroke();
        } else if (this.type==="leaf" || this.type==="snow") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.fillRect(this.x, this.y, this.size, this.size);
        } else if (this.type==="star") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.moveTo(this.x, this.y-this.size); ctx.lineTo(this.x+this.size/2, this.y-this.size/2); ctx.lineTo(this.x+this.size, this.y); ctx.lineTo(this.x+this.size/2, this.y+this.size/2); ctx.lineTo(this.x, this.y+this.size); ctx.lineTo(this.x-this.size/2, this.y+this.size/2); ctx.lineTo(this.x-this.size, this.y); ctx.lineTo(this.x-this.size/2, this.y-this.size/2); ctx.fill();
        } else {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        } ctx.restore();
    }
}

// Entities
class RectEntity { constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.active=true;} }
class Gem extends RectEntity { constructor(x,y){super(x,y,20,20);this.pulse=rand(0,6);} draw(ctx){ if(!this.active)return; this.pulse+=0.1; let dy=this.y+10+Math.sin(this.pulse)*5; ctx.fillStyle="#00ffc8"; ctx.beginPath(); ctx.arc(this.x+10,dy,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x+10,dy,5,0,Math.PI*2); ctx.fill(); } }
class Hazard extends RectEntity { constructor(x,y){super(x,y-30,30,30);} draw(ctx){ if(!this.active)return; ctx.fillStyle="#ff2020"; ctx.strokeStyle="#800000"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(this.x,this.y+this.h); ctx.lineTo(this.x+this.w,this.y+this.h); ctx.lineTo(this.x+this.w/2,this.y); ctx.closePath(); ctx.fill(); ctx.stroke(); } }
class JumpPad extends RectEntity { constructor(x,y){super(x,y-15,40,15);this.timer=0;} draw(ctx){ if(!this.active)return; let h=this.timer>0?25:15; if(this.timer>0)this.timer--; let dy=this.y+this.h-h; ctx.fillStyle="#32ff64"; ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(this.x+20,dy+h/2,20,h/2,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); } }
class DashOrb extends RectEntity { constructor(x,y){super(x,y,30,30);this.pulse=0;} draw(ctx){ if(!this.active)return; this.pulse+=0.15; let r=15+Math.sin(this.pulse)*5; let dy=this.y+15+Math.sin(this.pulse)*5; ctx.fillStyle="#0096ff"; ctx.beginPath(); ctx.arc(this.x+15,dy,r,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#c8f0ff"; ctx.beginPath(); ctx.arc(this.x+15,dy,r*0.5,0,Math.PI*2); ctx.fill(); } }

// --- Auto-Runner Player ---
class Player {
    constructor() { this.x=150; this.y=300; this.w=30; this.h=40; this.vy=0; this.gravity=0.65; this.jumpPower=-13; this.onGround=false; this.dashTimer=0; this.trail=[]; this.updateSkin(); }
    updateSkin(fId=null) {
        if(!saveData) return; let id=fId!==null?fId:saveData.equipped_id; let s=SKINS.find(x=>x.id===id);
        this.skinName=s.name; this.color=s.color; this.rarity=s.rarity;
    }
    jump(superJump=false) {
        if(!this.onGround && !superJump) return;
        this.vy = superJump?-18:this.jumpPower; this.onGround=false;
        if(superJump) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [50,255,100], "shockwave"));
        
        switch(this.skinName) {
            case "Ocean": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,150,255], "shockwave")); for(let i=0;i<8;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,150,255], "bubble")); break;
            case "Forest": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [50,200,50], "leaf")); break;
            case "Sakura": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,180,200], "leaf")); break;
            case "Sand": for(let i=0;i<15;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [210,180,140], "dust")); break;
            case "Glacier": for(let i=0;i<15;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,255,255], "snow")); break;
            case "Toxic": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [180,255,0], "shockwave")); break;
            case "Bloodmoon": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [200,30,30], "shockwave")); break;
            case "Neon": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,255,255], "dash")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,0,255], "dash")); break;
            case "Plasma": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,50,150], "shockwave")); break;
            case "Solar": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,150,0], "shockwave")); break;
            case "INFERNO": for(let i=0;i<15;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,100,0], "fire")); break;
            case "GALAXY": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [200,100,255], "normal")); break;
            case "ABYSSAL": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,255,255], "shockwave")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,0,100], "shockwave")); break;
            case "CHRONO": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,215,0], "shockwave")); break;
            case "DRAGON WARRIOR": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,215,0], "shockwave")); for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,215,0], "fire")); break;
            default: particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,255,255], "shockwave")); break;
        }
    }
    update() {
        let vx = game_speed;
        if(this.dashTimer>0){ 
            this.dashTimer--; vx=16; 
            this.y += (150 - this.y) * 0.1; this.vy = 0; // Lerp to sky
            
            if (this.skinName === "DRAGON WARRIOR") {
                particles.push(new Particle(this.x, this.y+this.h/2+Math.sin(frames*0.5)*20, [255,215,0], "dragon"));
                particles.push(new Particle(this.x, this.y+this.h/2+Math.sin(frames*0.5+Math.PI)*20, [255,100,0], "dragon"));
            } else {
                particles.push(new Particle(this.x, this.y+this.h/2, [0,150,255], "dash")); 
            }
            
            gems.forEach(g => {
                let dx = (this.x+15) - (g.x+10); let dy = (this.y+20) - (g.y+10);
                if(dx*dx + dy*dy < 100000) { g.x += dx*0.1; g.y += dy*0.1; }
            });

            if (this.dashTimer === 30) {
                let dropX = this.x + (30 * vx);
                platforms.push(new RectEntity(dropX - 100, 450, 600, 20));
                last_plat_x = Math.max(last_plat_x, dropX + 500); 
            }
            if (this.dashTimer < 10) this.vy += this.gravity;
        } else {
            this.vy+=this.gravity;
        }

        this.x+=vx; 
        this.y+=this.vy; this.onGround=false; 
        for(let p of platforms) if(AABB(this,p)){ 
            if(this.vy>0 && this.y+this.h - this.vy <= p.y + 10){ this.y=p.y-this.h; this.vy=0; this.onGround=true; } 
        }

        for(let p of pads) if(p.active && AABB(this,p) && this.vy>=0){ this.jump(true); p.timer=15; }
        for(let o of orbs) if(o.active && AABB(this,o)){ o.active=false; this.dashTimer=100; for(let i=0;i<30;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, [0,200,255])); }

        this.trail.push({x:this.x+this.w/2, y:this.y+this.h/2}); if(this.trail.length>12) this.trail.shift();
        
        if(this.onGround && Math.random()<0.3 && this.dashTimer===0){ 
            let c=this.skinName==="Sand"?[210,180,140]:this.skinName==="Forest"?[50,200,50]:this.skinName==="Ash"?[80,80,80]:[150,150,150]; 
            particles.push(new Particle(this.x, this.y+this.h, c, "dust")); 
        }
        if (this.skinName === "DRAGON WARRIOR") {
            let oX = Math.cos(frames*0.1)*30; let oY = Math.sin(frames*0.1)*30;
            particles.push(new Particle(this.x+15+oX, this.y+20+oY, [255,215,0], "normal"));
        } else if (this.skinName === "INFERNO" && Math.random() < 0.4) particles.push(new Particle(this.x+15+rand(-10,10), this.y+this.h-rand(0,20), [255,50,0], "fire"));
    }
    
    draw(ctx) {
        let cx=this.x+this.w/2;
        if(this.rarity === "Epic" || this.rarity === "Legendary"){
            for(let i=0;i<this.trail.length;i++){
                let t=this.trail[i]; let s=12*(i/this.trail.length); let p = i/this.trail.length;
                let col = this.skinName==="GALAXY"?`rgba(200,0,255,${p})`:this.skinName==="ABYSSAL"?`rgba(0,255,255,${p})`:this.skinName==="CHRONO"||this.skinName==="DRAGON WARRIOR"?`rgba(255,215,0,${p})`:this.skinName==="Neon"?(i%2===0?`rgba(0,255,255,${p})`:`rgba(255,0,255,${p})`):`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${p})`;
                ctx.fillStyle=col; ctx.beginPath(); ctx.arc(t.x, t.y, s, 0, Math.PI*2); ctx.fill();
            }
        }

        if(this.dashTimer>0){ 
            if (this.skinName==="DRAGON WARRIOR") {
                ctx.fillStyle="#ffd700"; ctx.beginPath(); ctx.moveTo(cx+20, this.y+10); ctx.lineTo(cx+40, this.y+20); ctx.lineTo(cx+20, this.y+30); ctx.fill();
            } else {
                ctx.strokeStyle="#0096ff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx, this.y+this.h/2, 35, 0, Math.PI*2); ctx.stroke(); 
            }
        }
        
        if (this.rarity === "Epic" || this.rarity === "Legendary") {
            let aura_surf = document.createElement('canvas'); aura_surf.width=80; aura_surf.height=80; let actx=aura_surf.getContext('2d');
            let acolor = this.skinName==="GALAXY"?[100,0,200]:this.skinName==="ABYSSAL"?[0,150,150]:this.skinName==="CHRONO"||this.skinName==="DRAGON WARRIOR"?[200,180,50]:this.skinName==="Void"?[50,0,100]:this.color;

                ctx.beginPath(); ctx.moveTo(cx-15, this.y+40-yOff); ctx.lineTo(cx-5, this.y+25-yOff); ctx.lineTo(cx+5, this.y+40-yOff); ctx.fill();
            } else if (this.skinName === "GALAXY") {

                ctx.fillRect(cx-5, this.y-10+yOff, 2, 2); ctx.fillRect(cx+8, this.y+yOff, 2, 2); ctx.fillRect(cx-10, this.y+10+yOff, 2, 2);

        ctx.fillStyle="#f5f5fa"; ctx.beginPath(); ctx.ellipse(cx, this.y+10, 12, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle="#141419"; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx-8, this.y+14); ctx.lineTo(cx-12, this.y+4); ctx.lineTo(cx-4, this.y+10); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx+8, this.y+14); ctx.lineTo(cx+12, this.y+4); ctx.lineTo(cx+4, this.y+10); ctx.fill();

function drawStaticSkin(ctx, cx, cy, skin, isUnlocked, scale=1) {
    ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
    let bottom = 20, top = -20;
    if (!isUnlocked) {
        ctx.fillStyle = "#1a1a24"; ctx.beginPath(); ctx.moveTo(0, top+15); ctx.lineTo(-16, bottom-8); ctx.lineTo(16, bottom-8); ctx.fill();
        ctx.fillStyle = "#202030"; ctx.beginPath(); ctx.ellipse(0, top+10, 12, 10, 0, 0, Math.PI*2); ctx.fill();
        drawText("?", 0, top+16, 20, "#505064"); drawText("LOCKED", 0, bottom+15, 12, "#505064"); ctx.restore(); return;
    }
    let c = skin.color;
    if (skin.rarity === "Legendary" || skin.rarity === "Epic") {
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]}, ${skin.rarity==="Legendary"?0.2:0.05})`;
        ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI*2); ctx.fill();
    }
    ctx.beginPath(); ctx.moveTo(0, top+15); ctx.lineTo(-16, bottom-8); ctx.lineTo(16, bottom-8); ctx.closePath(); ctx.save(); ctx.clip();
    
    if (skin.name === "Phantom") ctx.globalAlpha = 0.6;
    ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`; ctx.fill();
    
    if (skin.rarity === "Legendary") {
        if (skin.name === "INFERNO" || skin.name === "DRAGON WARRIOR") {
            let yOff = (frames * 2) % 20; ctx.fillStyle = skin.name==="INFERNO"?"rgba(255, 200, 0, 0.5)":"rgba(255, 0, 0, 0.5)";
            ctx.beginPath(); ctx.moveTo(-10, top+30-yOff); ctx.lineTo(0, top+15-yOff); ctx.lineTo(10, top+30-yOff); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-15, top+40-yOff); ctx.lineTo(-5, top+25-yOff); ctx.lineTo(5, top+40-yOff); ctx.fill();
        } else if (skin.name === "GALAXY") {
            let yOff = (frames * 0.5) % 20; ctx.fillStyle = "white";
            ctx.fillRect(-5, top+10+yOff, 2, 2); ctx.fillRect(8, top+20+yOff, 2, 2); ctx.fillRect(-10, top+30+yOff, 2, 2);
            ctx.fillRect(-5, top-10+yOff, 2, 2); ctx.fillRect(8, top+yOff, 2, 2); ctx.fillRect(-10, top+10+yOff, 2, 2);
        } else if (skin.name === "CHRONO") {
            let yOff = frames % 15; ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
            ctx.fillRect(-20, top+10+yOff, 40, 3); ctx.fillRect(-20, top+25+yOff, 40, 3); ctx.fillRect(-20, top-5+yOff, 40, 3);
        } else if (skin.name === "ABYSSAL") {
            if (Math.random() < 0.3) { ctx.fillStyle = "cyan"; ctx.fillRect(-20, top+20+rand(-5,5), 40, 2); ctx.fillStyle = "magenta"; ctx.fillRect(-20, top+25+rand(-5,5), 40, 2); }
        }
    }
    ctx.restore(); ctx.strokeStyle = "#141419"; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "#f5f5fa"; ctx.beginPath(); ctx.ellipse(0, top+10, 12, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8, top+14); ctx.lineTo(-12, top+4); ctx.lineTo(-4, top+10); ctx.fill(); ctx.beginPath(); ctx.moveTo(8, top+14); ctx.lineTo(12, top+4); ctx.lineTo(4, top+10); ctx.fill();
    ctx.fillStyle = (skin.name==="INFERNO"||skin.name==="DRAGON WARRIOR")?"#ff6400":skin.name==="ABYSSAL"?"#00ffff":skin.name==="Void"?"#ff00ff":"#141419";
    ctx.beginPath(); ctx.ellipse(-3, top+12, 2, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(3, top+12, 2, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawBackground() {
    let cycle = (distance % 5000) / 5000; 
    let rTop, gTop, bTop, rBot, gBot, bBot;
    if (cycle < 0.25) { 
        rTop = 10+(cycle*4*40); gTop = 10+(cycle*4*20); bTop = 30-(cycle*4*10); rBot = 20+(cycle*4*100); gBot = 20+(cycle*4*40); bBot = 40+(cycle*4*10);
    } else if (cycle < 0.5) { 
        let p = (cycle-0.25)*4; rTop = 50-(p*30); gTop = 30+(p*100); bTop = 20+(p*200); rBot = 120-(p*50); gBot = 60+(p*100); bBot = 50+(p*200);
    } else if (cycle < 0.75) { 
        let p = (cycle-0.5)*4; rTop = 20+(p*80); gTop = 130-(p*80); bTop = 220-(p*180); rBot = 70+(p*150); gBot = 160-(p*100); bBot = 250-(p*200);
    } else { 
        let p = (cycle-0.75)*4; rTop = 100-(p*90); gTop = 50-(p*40); bTop = 40-(p*10); rBot = 220-(p*200); gBot = 60-(p*40); bBot = 50-(p*10);
    }
    let grad = ctx.createLinearGradient(0,0,0,600); grad.addColorStop(0, `rgb(${rTop},${gTop},${bTop})`); grad.addColorStop(1, `rgb(${rBot},${gBot},${bBot})`);
    ctx.fillStyle = grad; ctx.fillRect(0,0,900,600);

    ctx.fillStyle = "#1a1a24"; ctx.beginPath();
    for(let i=0; i<10; i++) { let px = (i*200) - ((camera_x*0.2) % 200); ctx.lineTo(px, 400 - Math.sin(i)*100); }
    ctx.lineTo(900, 600); ctx.lineTo(0, 600); ctx.fill();
    
    for(let b of bg_props) {
        let drawX = b.x - (camera_x * 0.5);
        if (drawX > -100 && drawX < 1000) {
            if (b.type === "tree") {
                ctx.fillStyle = "#142814"; ctx.fillRect(drawX, b.y-80, 20, 80);
                ctx.fillStyle = "#0f3c0f"; ctx.beginPath(); ctx.arc(drawX+10, b.y-90, 30, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.fillStyle = "#141419"; ctx.fillRect(drawX, b.y-150, 60, 150);
                ctx.fillStyle = "#00ffc8"; ctx.fillRect(drawX+10, b.y-140, 10, 20); ctx.fillRect(drawX+40, b.y-100, 10, 20);
            }
        }
    }
}

// Parallax & Level Gen
function generateChunk(lX, lY) {
    let cX=lX; let cY=lY; let np=Math.floor(rand(4,7));
    for(let i=0;i<np;i++){
        let gap = rand(100, 200 + (game_speed*10)); 
        cX+=gap; cY=Math.max(200, Math.min(500, cY+rand(-80,80))); let pW=rand(200,500); 
        platforms.push(new RectEntity(cX, cY, pW, 20));

        if(Math.random()<0.35){
            let aY=Math.max(100, cY-rand(140,180)); platforms.push(new RectEntity(cX+50, aY, pW-50, 20));
            if(Math.random()<0.3) orbs.push(new DashOrb(cX + pW/2, aY-40)); else for(let j=0;j<4;j++) gems.push(new Gem(cX+80+(j*40), aY-35));
            pads.push(new JumpPad(cX+30, cY));
        }

        bg_props.push({x: cX+rand(0, pW-50), y: cY, type: Math.random()>0.5?"tree":"pillar"});

        let r=Math.random(); 
        if(r<0.08) orbs.push(new DashOrb(cX+pW/2, cY-40)); 
        else if(r<0.3) hazards.push(new Hazard(cX+pW/2, cY)); 
        else if(r<0.7) for(let j=0;j<Math.floor(rand(1,5));j++) gems.push(new Gem(cX+pW/2+(j*30), cY-35));
        cX+=pW;
    }
    last_plat_x=cX; last_plat_y=cY;
}

// BUG FIX: Completely robust Gacha mathematics. Guaranteed to return a valid skin!
function rollGacha() {
    let r = Math.random(); let pool = [];
    if (r > 0.99) pool = SKINS.filter(s => s.rarity === "Legendary");
    else if (r > 0.91) pool = SKINS.filter(s => s.rarity === "Epic");
    else if (r > 0.60) pool = SKINS.filter(s => s.rarity === "Rare");
    else pool = SKINS.filter(s => s.rarity === "Common");
    
    return pool[Math.floor(Math.random() * pool.length)]; // Safe array bounds!
}

const player = new Player(); const preview = new Player();

// --- Main Input Router (Clean Hitboxes) ---
function handleCanvasClick(mx, my) {

        let c = 5; let startX = 50; let startY = 120;
        for (let i = 0; i < SKINS.length; i++) {

        }
        
        if (isBtn(mx, my, 550, 450, 250, 50)) {

                saveData.equipped_id = SKINS[vault_sel].id; player.updateSkin(); syncToCloud();
            }

                saveData.gems -= GACHA_COST; syncToCloud(); 
                gacha_target = rollGacha();

                state = "GACHA_ANIM"; gacha_timer = 180; gacha_return_state = "GACHA_MENU";
            }
        }

        if (isBtn(mx, my, 350, 500, 200, 50) || mx === -1) {
            state = gacha_return_state; 
            if (state === "MENU") fetchLeaderboard();
        }
    }
    else if (state === "SHARD_MENU") {
        if (isBtn(mx, my, 50, 30, 100, 40)) { state = "MENU"; fetchLeaderboard(); }
        else if (isBtn(mx, my, 250, 280, 50, 50)) shard_sel = (shard_sel + 3) % 4; 
        else if (isBtn(mx, my, 600, 280, 50, 50)) shard_sel = (shard_sel + 1) % 4; 
        else if (isBtn(mx, my, 350, 450, 200, 60) || mx === -1) {

                if (missing.length > 0) {

                    gacha_target = missing[Math.floor(Math.random() * missing.length)]; // Safe pulling!
                    preview.updateSkin(gacha_target.id); preview.x=450-15; preview.y=280; 
                    state = "GACHA_ANIM"; gacha_timer = 180; gacha_return_state = "SHARD_MENU";

}

// --- Main Engine ---
function update() {
    frames++; if (state === "LOGIN") return; 
    
    if (state === "PLAYING") {
        player.update();
        game_speed += 0.001; 
        
        if (camera_x + 1800 > last_plat_x) generateChunk(last_plat_x, last_plat_y);

        platforms=platforms.filter(p=>p.x+p.w>camera_x-100); gems=gems.filter(g=>g.x+g.w>camera_x-100); 
        hazards=hazards.filter(h=>h.x+h.w>camera_x-100); pads=pads.filter(p=>p.x+p.w>camera_x-100); 
        orbs=orbs.filter(o=>o.x+o.w>camera_x-100); bg_props=bg_props.filter(b=>b.x>camera_x-100);

        let target_cam = player.x - 200; 
        camera_x += (target_cam - camera_x) * 0.1; camera_x = Math.max(0, camera_x);
        distance = Math.max(distance, Math.floor(player.x / 10));

        let dead = player.y > 650;
        if (player.dashTimer === 0) for (let h of hazards) if (h.active && AABB(player, h)) dead = true;

        if (dead) {
            state = "GAMEOVER";
            if (distance > saveData.high_score) { saveData.high_score = distance; syncToCloud(); }
        }

        for (let g of gems) if (g.active && AABB(player, g)) { 
            g.active=false; saveData.gems+=5; syncToCloud(); 
            for(let i=0;i<5;i++) particles.push(new Particle(g.x+10,g.y+10,[0,255,200])); 
        }
    } else if (state === "GACHA_ANIM") {
        gacha_timer--;
        
        // UNIQUE RARITY EFFECTS
        let pct = 1 - (gacha_timer / 180); 
        let r_col = [150, 150, 150]; // Common Grey
        if (gacha_target.rarity === "Rare") r_col = [0, 255, 255]; // Rare Cyan
        if (gacha_target.rarity === "Epic") r_col = [255, 50, 50]; // Epic Red
        if (gacha_target.rarity === "Legendary") r_col = [255, 215, 0]; // Legendary Gold

        if (gacha_timer % 3 === 0) {
            if (gacha_target.rarity === "Legendary") particles.push(new Particle(450+rand(-60,60), 300+rand(-60,60), [255,215,0], "star"));
            if (gacha_target.rarity === "Epic" && gacha_timer % 15 === 0) particles.push(new Particle(450, 300, [255,50,50], "shockwave"));
        }

        if (gacha_timer <= 0) {
            let c = gacha_target.color; 
            for(let i=0;i<60;i++) particles.push(new Particle(450, 300, c));
            if (gacha_target.rarity === "Legendary") for(let i=0;i<30;i++) particles.push(new Particle(450, 300, [255,215,0], "star"));
            if (gacha_target.rarity === "Epic") for(let i=0;i<3;i++) particles.push(new Particle(450, 300, [255,50,50], "shockwave"));

            if (saveData.unlocked.includes(gacha_target.id)) {
                gacha_msg="DUPLICATE"; shard_reward = gacha_target.rarity==="Common"?10:gacha_target.rarity==="Rare"?30:gacha_target.rarity==="Epic"?75:150; saveData.shards+=shard_reward;
            } else { gacha_msg="NEW SKIN!"; saveData.unlocked.push(gacha_target.id); }
            syncToCloud(); state = "GACHA_RESULT";
        }
    } else if (state === "MENU" || state === "GACHA_RESULT" || state === "VAULT") {
        if (frames % 20 === 0 && (player.skinName==="INFERNO" || player.skinName==="DRAGON WARRIOR")) {
            let col = player.skinName==="INFERNO"?[255,50,0]:[255,215,0];
            particles.push(new Particle(player.x+15+rand(-10,10), player.y+40, col, "fire"));
        }
    }
    particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);
}

    if (state === "LOGIN") return; 
    ctx.fillStyle = "#0f0f19"; ctx.fillRect(0, 0, 900, 600);

        for(let p of pads) p.draw(ctx); for(let h of hazards) h.draw(ctx); for(let o of orbs) o.draw(ctx); for(let g of gems) g.draw(ctx); for(let p of particles) p.draw(ctx);

        ctx.fillStyle="#202030"; ctx.strokeStyle="#00ffc8"; ctx.lineWidth=2;
        for (let p of platforms) { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.w, p.y); ctx.stroke(); }
        for(let p of pads) p.draw(ctx); for(let h of hazards) h.draw(ctx); for(let o of orbs) o.draw(ctx); for(let g of gems) g.draw(ctx); for(let p of particles) p.draw(ctx);

        ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,600);

    } else if (state === "VAULT") {
        ctx.fillStyle = "#0a0a10"; ctx.fillRect(0,0,900,600); for(let p of particles) p.draw(ctx); 
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16);
        drawText("SKIN VAULT", 450, 60, 40, "#ffd700");
        let pct = Math.floor((saveData.unlocked.length / SKINS.length) * 100); drawText(`Completion: ${pct}%`, 450, 90, 16, "#aaaaaa");

        let c = 5; let startX = 50; let startY = 120;
        for (let i = 0; i < SKINS.length; i++) {
            let x = startX + (i % c) * 80; let y = startY + Math.floor(i / c) * 90;
            ctx.fillStyle = vault_sel===i ? "rgba(0,255,200,0.2)" : "rgba(30, 30, 40, 0.5)"; 
            ctx.strokeStyle = saveData.equipped_id === SKINS[i].id ? "#00ffc8" : vault_sel===i ? "white" : "#202030"; ctx.lineWidth = 2;
            ctx.fillRect(x, y, 70, 80); ctx.strokeRect(x, y, 70, 80);
            drawStaticSkin(ctx, x+35, y+35, SKINS[i], saveData.unlocked.includes(SKINS[i].id), 0.8);
        }

        let s = SKINS[vault_sel]; let isUnl = saveData.unlocked.includes(s.id);
        ctx.fillStyle = "rgba(20,20,30,0.8)"; ctx.fillRect(500, 120, 350, 400); ctx.strokeStyle="#505064"; ctx.strokeRect(500, 120, 350, 400);
        drawText(isUnl ? s.name : "???", 675, 170, 36, isUnl ? RARITY_COLORS[s.rarity] : "#505064");
        drawText(isUnl ? s.rarity.toUpperCase() : "LOCKED", 675, 200, 20, isUnl ? RARITY_COLORS[s.rarity] : "#505064");
        
        drawStaticSkin(ctx, 675, 320, s, isUnl, 2.5);

        if (isUnl) {
            if (saveData.equipped_id === s.id) drawButton(550, 450, 250, 50, "IN USE", "#404040", "#505050", "#aaaaaa");
            else drawButton(550, 450, 250, 50, "EQUIP SKIN", "#0096ff", "#00ffc8", "black");
        } else {
            drawButton(550, 450, 250, 50, "LOCKED", "#202020", "#303030", "#505050");
        }

    } else if (state === "MENU") {
        ctx.fillStyle = "#050508"; ctx.fillRect(0,0,900,600);
        for (let p of particles) p.draw(ctx);
        player.x = 180; player.y = 350; player.draw(ctx); 

        // SLEEK REDESIGNED MENU
        drawText("CRYSTAL JUMPER", 450, 100, 54, "#c8c8ff");
        drawText(`Equipped: ${player.skinName}`, 180, 490, 20, `rgb(${player.color.join(",")})`);
        
        drawButton(350, 220, 200, 70, "▶ PLAY", "#0096ff", "#00ffc8", "black", 28);
        drawButton(350, 310, 95, 60, "VAULT", "#800080", "#c832ff", "white", 16);
        drawButton(455, 310, 95, 60, "GACHA", "#808000", "#ffd700", "black", 16);
        drawButton(350, 385, 200, 50, "SHARD SHOP", "#640000", "#ff3232", "white", 18);

        drawText(`Gems: ${saveData.gems}  |  Shards: ${saveData.shards}`, 450, 550, 20, "#00ffc8");

        ctx.fillStyle = "rgba(15, 15, 20, 0.8)"; ctx.strokeStyle = "#505064"; ctx.fillRect(660, 200, 210, 250); ctx.strokeRect(660, 200, 210, 250);
        drawText("LEADERBOARD", 765, 230, 16, "#ffd700");
        if (leaderboardData.length === 0) drawText("Loading...", 765, 300, 14, "#aaaaaa");
        else {
            for(let i=0; i<leaderboardData.length; i++) {
                let f = leaderboardData[i]; let col = f.name === currentPlayerId ? "#00ffc8" : "white";
                drawText(`${i+1}.${f.name}`, 680, 270 + (i*35), 14, col, "left"); drawText(`${f.score}m`, 850, 270 + (i*35), 14, col, "right");
            }
        }

        if (showBanner) {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,600);
            drawText("🔥 NEW SKIN ALERT 🔥", 450, 150, 48, "#ffd700");
            drawText("DRAGON WARRIOR", 450, 200, 36, "#ff6400");
            drawStaticSkin(ctx, 450, 350, SKINS[19], true, 3.0);
            particles.push(new Particle(450+Math.cos(frames*0.1)*60, 350+Math.sin(frames*0.1)*60, [255,215,0], "star"));
            drawButton(350, 500, 200, 50, "CLOSE", "#404040", "#606060", "white");
        }

    } else if (state === "SHARD_MENU") {
        ctx.fillStyle = "#0f0f19"; ctx.fillRect(0,0,900,600);
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16);
        drawText("SHARD EXCHANGE", 450, 100, 48, "#ffd700"); drawText(`Wallet: ${saveData.shards} Shards`, 450, 160, 24, "#00ffc8");

        const T = ["Common", "Rare", "Epic", "Legendary"]; let r = T[shard_sel]; let cost = SHARD_PRICES[r]; let col = RARITY_COLORS[r];
        
        drawButton(250, 280, 50, 50, "◀", "#202030", "#404050", "white");
        drawText(r.toUpperCase() + " SKIN", 450, 315, 36, col);
        drawButton(600, 280, 50, 50, "▶", "#202030", "#404050", "white");

        drawText(`Cost: ${cost} Shards`, 450, 380, 24, "white");
        let missing = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id)).length;
        drawText(`Missing: ${missing}`, 450, 420, 20, missing > 0 ? "#32c850" : "#ff3232");

        drawButton(350, 450, 200, 60, "PURCHASE", "#0096ff", "#00ffc8");

    } else if (state === "GACHA_MENU") {
        ctx.fillStyle = "#0f0f19"; ctx.fillRect(0,0,900,600);
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16);
        drawText("GACHA TEMPLE", 450, 150, 54, "#ffd700"); drawText(`Cost: ${GACHA_COST} Gems`, 450, 220, 24, "white");
        drawText(`Wallet: ${saveData.gems} Gems`, 450, 260, 24, "#00ffc8");
        drawButton(350, 350, 200, 60, "SUMMON", "#800080", "#c832ff", "white", 24);

    } else if (state === "GACHA_ANIM") {
        ctx.fillStyle = "#0a0a10"; ctx.fillRect(0,0,900,600);
        
        let pct = 1 - (gacha_timer / 180); 
        let r_col = [150, 150, 150]; // Default Common Grey
        if (gacha_target.rarity === "Rare") r_col = [0, 255, 255]; 
        if (gacha_target.rarity === "Epic") r_col = [255, 50, 50]; 
        if (gacha_target.rarity === "Legendary") r_col = [255, 215, 0]; 
        
        let r = 200+(r_col[0]-200)*pct, g = 200+(r_col[1]-200)*pct, b = 200+(r_col[2]-200)*pct; 
        let rad = 20+(pct*40); let sx = rand(-5,5)*pct, sy = rand(-5,5)*pct;

        ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(450+sx, 300+sy, rad, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(450+sx, 300+sy, rad/2, 0, Math.PI*2); ctx.fill(); 
        drawText("SUMMONING...", 450, 100, 48, `rgb(${r},${g},${b})`);

    } else if (state === "GACHA_RESULT") {
        ctx.fillStyle = "#0f0f19"; ctx.fillRect(0,0,900,600); for(let p of particles) p.draw(ctx);
        let col = RARITY_COLORS[gacha_target.rarity];
        drawText(`PULLED: ${gacha_target.name}`, 450, 120, 48, col); drawText(`Rarity: ${gacha_target.rarity}`, 450, 170, 24, col);
        preview.draw(ctx);
        if (gacha_msg === "DUPLICATE") { drawText("DUPLICATE DETECTED", 450, 380, 24, "#ff3232"); drawText(`Converted to +${shard_reward} Shards`, 450, 420, 24, "#ffd700"); }
        else drawText("NEW SKIN UNLOCKED!", 450, 380, 24, "#00ffc8");
        drawButton(350, 500, 200, 50, "CONTINUE", "#202030", "#404050", "white");
    }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
