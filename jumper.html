    try {

        else return { gems: 15000, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 };

// --- ULTIMATE VFX ENGINE ---
class Particle {
    constructor(x, y, color, type="normal") {
        this.x=x; this.y=y; this.color=color; this.type=type; this.life=255; this.size=rand(3,6);
        this.dx=(Math.random()-0.5)*4; this.dy=(Math.random()-0.5)*4;
        
        switch(type) {
            case "fire": this.dy=rand(-6,-2); this.dx=rand(-2,2); this.size=rand(4,9); break;
            case "dragon": this.dx=rand(-8,-3); this.dy=rand(-1,1); this.size=10; break;
            case "dash": this.dx=rand(-10,-5); this.dy=rand(-2,2); this.size=8; break;
            case "bubble": this.dx=rand(-2,2); this.dy=rand(-4,-1); this.size=rand(3,6); break;
            case "leaf": this.dx=rand(-3,3); this.dy=rand(0,3); this.size=rand(4,6); break;
            case "snow": this.dx=rand(-2,2); this.dy=rand(1,4); this.size=rand(2,4); break;
            case "slime": this.dx=rand(-2,2); this.dy=rand(2,5); this.size=rand(3,6); break;
            case "ash": this.dx=rand(-1,3); this.dy=rand(-3,-1); this.size=rand(3,7); break;
            case "sparkle": this.dx=rand(-3,3); this.dy=rand(-3,3); this.size=rand(2,4); break;
            case "toxic": this.dx=rand(-2,2); this.dy=rand(-4,-2); this.size=rand(4,8); break;
            case "blood": this.dx=rand(-4,4); this.dy=rand(-2,2); this.size=rand(3,6); break;
            case "ghost": this.dx=rand(-2,2); this.dy=rand(-3,0); this.size=rand(5,10); break;
            case "plasma": this.dx=rand(-8,8); this.dy=rand(-8,8); this.size=rand(1,3); break;
            case "solar": this.dx=rand(-5,5); this.dy=rand(-5,5); this.size=rand(4,8); break;
            case "void": this.dx=rand(-1,1); this.dy=rand(-1,1); this.size=rand(6,12); break;
            case "wave": this.dx=0; this.dy=0; this.radius=5; break;
            case "star": this.dx=rand(-8,8); this.dy=rand(-8,8); this.size=rand(4,8); break;
        }
    }
    update() {
        this.x+=this.dx; this.y+=this.dy;
        switch(this.type) {
            case "fire": case "dragon": case "solar": this.life-=10; this.size=Math.max(0.1,this.size-0.1); break;
            case "bubble": case "leaf": case "snow": this.life-=8; this.x+=Math.sin(frames*0.1)*2; break;
            case "slime": this.life-=12; this.dy+=0.2; break;
            case "ghost": this.life-=6; this.size+=0.1; break; 
            case "void": this.life-=15; this.size=Math.max(0.1,this.size-0.5); break; 
            case "wave": this.radius+=8; this.life-=12; break;
            case "star": this.life-=6; this.size=Math.max(0.1,this.size-0.1); break;
            case "plasma": this.life-=20; break;
            default: this.life-=12; break;
        }
    }
    draw(ctx) {
        if(this.life<=0)return; ctx.save();
        if(this.type==="wave"){
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.strokeStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.lineWidth=3; ctx.stroke();
        } else if (this.type==="leaf" || this.type==="snow") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.fillRect(this.x, this.y, this.size, this.size);
        } else if (this.type==="star") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.moveTo(this.x, this.y-this.size); ctx.lineTo(this.x+this.size/3, this.y-this.size/3); ctx.lineTo(this.x+this.size, this.y); ctx.lineTo(this.x+this.size/3, this.y+this.size/3); ctx.lineTo(this.x, this.y+this.size); ctx.lineTo(this.x-this.size/3, this.y+this.size/3); ctx.lineTo(this.x-this.size, this.y); ctx.lineTo(this.x-this.size/3, this.y-this.size/3); ctx.fill();
        } else if (this.type==="plasma") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.fillRect(this.x, this.y, this.size*4, this.size);
        } else {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        } ctx.restore();
    }
}

// Entities
class RectEntity { constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.active=true;} }
class Gem extends RectEntity { constructor(x,y){super(x,y,20,20);this.pulse=rand(0,6);} draw(ctx){ if(!this.active)return; this.pulse+=0.1; let dy=this.y+10+Math.sin(this.pulse)*5; ctx.fillStyle="#00ffc8"; ctx.beginPath(); ctx.arc(this.x+10,dy,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x+10,dy,5,0,Math.PI*2); ctx.fill(); } }
class ShardDrop extends RectEntity {

        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x+10, dy, 3, 0, Math.PI*2); ctx.fill();
    } 
}

class JumpPad extends RectEntity { draw(ctx){ ctx.fillStyle="#32ff64"; ctx.fillRect(this.x,this.y,40,10); } }

// Power-Ups
class PowerUp extends RectEntity {
    constructor(x,y,type){ super(x,y,40,40); this.pType=type; this.pulse=rand(0,Math.PI*2); }
    draw(ctx) {
        if(!this.active)return; this.pulse+=0.1; let dy=this.y+20+Math.sin(this.pulse)*5; let cx=this.x+20;
        let c1, c2, emoji;
        if(this.pType===0){ c1="rgba(255,100,0,0.5)"; c2="#ff0000"; emoji="🚀"; } 
        else if(this.pType===1){ c1="rgba(0,150,255,0.5)"; c2="#00ffff"; emoji="🧲"; } 
        else if(this.pType===2){ c1="rgba(50,255,100,0.5)"; c2="#00ff00"; emoji="🛡️"; } 
        else if(this.pType===3){ c1="rgba(255,215,0,0.5)"; c2="#ffffff"; emoji="👼"; } 
        else if(this.pType===4){ c1="rgba(128,0,128,0.5)"; c2="#ff00ff"; emoji="🦇"; } 
        
        ctx.fillStyle=c1; ctx.beginPath(); ctx.arc(cx, dy, 20, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle=c2; ctx.lineWidth=2; ctx.stroke(); 
        drawText(emoji, cx, dy+8, 24, "white");
        ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.beginPath(); ctx.arc(cx-8, dy-8, 4, 0, Math.PI*2); ctx.fill(); 
    }
}

// --- THE HOLLOW KNIGHT MODEL GENERATOR ---
function drawKnightModel(ctx, cx, cy, skin, isMoving, frames, pState) {
    let rarity = skin.rarity; let c = skin.color;
    let runBounce = isMoving ? Math.sin(frames * 0.6) * 3 : 0;
    let cloakSway = isMoving ? Math.cos(frames * 0.6) * 6 : 0;
    let jetLean = (pState && pState.jetpack > 0) ? 10 : 0;
    cy += runBounce; cx += jetLean;

    if (pState && pState.demon > 0) {
        ctx.fillStyle = skin.name==="DRAGON WARRIOR" ? "#ffd700" : "#ff00ff";
        let wingFlap = Math.sin(frames*0.4)*15;
        ctx.beginPath(); ctx.moveTo(cx, cy+10); ctx.lineTo(cx-40, cy-20+wingFlap); ctx.lineTo(cx-10, cy+30); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx, cy+10); ctx.lineTo(cx+40, cy-20+wingFlap); ctx.lineTo(cx+10, cy+30); ctx.fill();
    }

    if (rarity === "Epic" || rarity === "Legendary") {
        let acolor = skin.name==="GALAXY"?[100,0,200]:skin.name==="ABYSSAL"?[0,150,150]:skin.name==="DRAGON WARRIOR"?[200,180,50]:skin.color;
        let intensity = rarity==="Epic" ? 15 : 30; let glow = Math.abs(Math.sin(frames*0.1)) * (rarity==="Epic"?10:25);
        let rad = intensity + glow;
        let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        grad.addColorStop(0, `rgba(${acolor[0]},${acolor[1]},${acolor[2]}, 0.8)`);
        grad.addColorStop(1, `rgba(${acolor[0]},${acolor[1]},${acolor[2]}, 0)`);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.fill();
    }

    ctx.strokeStyle = "#c8c8c8"; ctx.lineWidth = 3;
    let legSw = isMoving && (!pState || pState.jetpack<=0) ? Math.sin(frames * 0.8) * 8 : 0;
    let lcy = cy + 18 - jetLean;
    ctx.beginPath(); ctx.moveTo(cx - 5, lcy); ctx.lineTo(cx - 5 + legSw, lcy + 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 5, lcy); ctx.lineTo(cx + 5 - legSw, lcy + 10); ctx.stroke();

    let maskColor = (skin.name === "Void" || skin.name === "ABYSSAL") ? "#222" : (skin.name === "DRAGON WARRIOR") ? "#ffd700" : "#f5f5fa";
    ctx.fillStyle = maskColor; ctx.strokeStyle = "#141419"; ctx.lineWidth = 2;
    
    ctx.beginPath();
    if (rarity === "Starter" || rarity === "Common") {
        ctx.moveTo(cx-6, cy-12); ctx.lineTo(cx-10, cy-22); ctx.lineTo(cx-2, cy-15); 
        ctx.moveTo(cx+6, cy-12); ctx.lineTo(cx+10, cy-22); ctx.lineTo(cx+2, cy-15);
    } else if (rarity === "Rare") {
        ctx.moveTo(cx-6, cy-12); ctx.quadraticCurveTo(cx-18, cy-30, cx-2, cy-28); ctx.lineTo(cx-3, cy-15); 
        ctx.moveTo(cx+6, cy-12); ctx.quadraticCurveTo(cx+18, cy-30, cx+2, cy-28); ctx.lineTo(cx+3, cy-15);
    } else if (rarity === "Epic") {
        ctx.moveTo(cx-5, cy-12); ctx.quadraticCurveTo(cx-25, cy-35, cx-30, cy-15); ctx.lineTo(cx-2, cy-15); 
        ctx.moveTo(cx+5, cy-12); ctx.quadraticCurveTo(cx+25, cy-35, cx+30, cy-15); ctx.lineTo(cx+2, cy-15); 
    } else if (rarity === "Legendary") {
        ctx.moveTo(cx-6, cy-12); ctx.lineTo(cx-20, cy-30); ctx.lineTo(cx-10, cy-20); ctx.lineTo(cx-5, cy-35); ctx.lineTo(cx, cy-15); 
        ctx.moveTo(cx+6, cy-12); ctx.lineTo(cx+20, cy-30); ctx.lineTo(cx+10, cy-20); ctx.lineTo(cx+5, cy-35); ctx.lineTo(cx, cy-15);
    }
    ctx.fill(); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(cx, cy - 5); ctx.lineTo(cx - 15 + cloakSway, cy + 18); ctx.lineTo(cx + 15, cy + 15); ctx.closePath();
    ctx.save(); ctx.clip();
    
    if (skin.name === "Phantom") ctx.globalAlpha = 0.6;
    if (skin.name === "Slime") { ctx.fillStyle=`rgb(${c})`; ctx.fillRect(cx-20, cy-10+Math.sin(frames*0.2)*3, 40, 40); }
    else { ctx.fillStyle=`rgb(${c})`; ctx.fill(); }

    if (rarity === "Legendary") {
        if (skin.name === "INFERNO" || skin.name === "DRAGON WARRIOR") {
            let yOff = (frames * 2) % 20; ctx.fillStyle = skin.name==="INFERNO"?"rgba(255, 200, 0, 0.5)":"rgba(255, 255, 255, 0.4)";
            ctx.beginPath(); ctx.moveTo(cx-10, cy+30-yOff); ctx.lineTo(cx, cy+15-yOff); ctx.lineTo(cx+10, cy+30-yOff); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx-15, cy+40-yOff); ctx.lineTo(cx-5, cy+25-yOff); ctx.lineTo(cx+5, cy+40-yOff); ctx.fill();
        } else if (skin.name === "GALAXY") {
            let yOff = (frames * 0.5) % 20; ctx.fillStyle = "white";
            ctx.fillRect(cx-5, cy+10+yOff, 2, 2); ctx.fillRect(cx+8, cy+20+yOff, 2, 2); ctx.fillRect(cx-10, cy+30+yOff, 2, 2);
        } else if (skin.name === "ABYSSAL") {
            if (Math.random() < 0.3) { ctx.fillStyle = "cyan"; ctx.fillRect(cx-20, cy+20+rand(-5,5), 40, 2); ctx.fillStyle = "magenta"; ctx.fillRect(cx-20, cy+25+rand(-5,5), 40, 2); }
        }
    }
    ctx.restore(); ctx.stroke();

    ctx.fillStyle = maskColor; ctx.beginPath(); ctx.arc(cx, cy - 8, 11, 0, Math.PI*2); ctx.fill(); ctx.stroke();

    let eyeCol = (skin.name === "Neon") ? "#00ffff" : (skin.name === "INFERNO") ? "#ff6400" : "#0a0a10";
    ctx.fillStyle = eyeCol; let eyeLookX = (isMoving && (!pState || pState.jetpack<=0)) ? 2 : 0; 
    ctx.beginPath(); ctx.ellipse(cx-4+eyeLookX, cy-7, 3, 5, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+4+eyeLookX, cy-7, 3, 5, 0.2, 0, Math.PI*2); ctx.fill();

    if (pState) {
        if (pState.shield) { ctx.strokeStyle = skin.name==="DRAGON WARRIOR" ? "#ffd700" : "#32ff64"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx, cy, 35+Math.sin(frames*0.1)*5, 0, Math.PI*2); ctx.stroke(); }
        if (pState.angel) { ctx.strokeStyle = "#ffd700"; ctx.lineWidth=4; ctx.beginPath(); ctx.ellipse(cx, cy-25+Math.sin(frames*0.1)*3, 12, 4, 0, 0, Math.PI*2); ctx.stroke(); }
    }
}

class Player {
    constructor() { 
        this.x=150; this.y=300; this.w=30; this.h=40; this.vy=0; this.gravity=0.65; this.jumpPower=-13; this.onGround=false; this.trail=[]; 
        this.jetpack=0; this.magnet=0; this.shield=false; this.angel=false; this.demon=0; this.iframes=0;
        this.updateSkin(); 
    }
    updateSkin(fId=null) {
        if(!saveData) return; let id=fId!==null?fId:saveData.equipped_id; let s=SKINS.find(x=>x.id===id);
        this.skinName=s.name; this.color=s.color; this.rarity=s.rarity;
    }
    jump(superJump=false) {
        if(!this.onGround && !superJump) return;
        this.vy = superJump?-18:this.jumpPower; this.onGround=false;
        
        let cx = this.x+this.w/2; let cy = this.y+this.h;
        switch(this.skinName) {
            case "Squire": for(let i=0;i<5;i++) particles.push(new Particle(cx, cy, [200,200,200], "dust")); break;
            case "Forest": for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [50,200,50], "leaf")); break;
            case "Sand": for(let i=0;i<10;i++) particles.push(new Particle(cx, cy, [210,180,140], "dust")); break;
            case "Ocean": for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [50,150,255], "bubble")); break;
            case "Sakura": for(let i=0;i<10;i++) particles.push(new Particle(cx, cy, [255,180,200], "leaf")); break;
            case "Slime": for(let i=0;i<10;i++) particles.push(new Particle(cx, cy, [100,255,50], "slime")); break;
            case "Ash": for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [80,80,80], "ash")); break;
            
            case "Amethyst": for(let i=0;i<10;i++) particles.push(new Particle(cx, cy, [150,50,255], "sparkle")); break;
            case "Glacier": for(let i=0;i<12;i++) particles.push(new Particle(cx, cy, [150,255,255], "snow")); break;
            case "Toxic": for(let i=0;i<12;i++) particles.push(new Particle(cx, cy, [180,255,0], "toxic")); break;
            
            case "Bloodmoon": particles.push(new Particle(cx, cy, [200,30,30], "wave")); for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [200,30,30], "blood")); break;
            case "Neon": particles.push(new Particle(cx, cy, [0,255,255], "dash")); particles.push(new Particle(cx, cy, [255,0,255], "dash")); break;
            case "Phantom": for(let i=0;i<6;i++) particles.push(new Particle(cx, cy, [200,220,255], "ghost")); break;
            case "Plasma": for(let i=0;i<15;i++) particles.push(new Particle(cx, cy, [255,50,150], "plasma")); break;
            case "Solar": particles.push(new Particle(cx, cy, [255,150,0], "wave")); for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [255,150,0], "solar")); break;
            case "Void": particles.push(new Particle(cx, cy, [40,0,60], "void")); break;
            
            case "INFERNO": particles.push(new Particle(cx, cy, [255,50,0], "wave")); for(let i=0;i<12;i++) particles.push(new Particle(cx, cy, [255,100,0], "fire")); break;
            case "GALAXY": particles.push(new Particle(cx, cy, [200,100,255], "wave")); for(let i=0;i<12;i++) particles.push(new Particle(cx, cy, [200,100,255], "star")); break;
            case "ABYSSAL": particles.push(new Particle(cx, cy, [0,255,255], "wave")); particles.push(new Particle(cx, cy, [255,0,255], "wave")); break;
            case "DRAGON WARRIOR": particles.push(new Particle(cx, cy, [255,215,0], "wave")); for(let i=0;i<8;i++) particles.push(new Particle(cx, cy, [255,215,0], "fire")); break;
        }
    }
    update() {
        let vx = game_speed;
        if(this.iframes > 0) this.iframes--;

        // Demon Wings
        if (this.demon > 0 && this.jetpack <= 0) {
            this.demon--;
            if (isPointerDown) {
                this.vy = -6; 
                if(frames%2===0) particles.push(new Particle(this.x+15, this.y+20, [150,0,255], "fire"));
            } else this.vy += this.gravity * 0.5; 
        }

        // Jetpack
        if(this.jetpack>0){ 
            this.jetpack--; vx=18; this.y += (150 - this.y) * 0.1; this.vy = 0; this.magnet = Math.max(this.magnet, 5); 
            
            if (this.skinName === "DRAGON WARRIOR") {
                particles.push(new Particle(this.x+15, this.y+20+Math.sin(frames*0.5)*30, [255,215,0], "dragon"));
                particles.push(new Particle(this.x+15, this.y+20+Math.sin(frames*0.5+Math.PI)*30, [255,100,0], "dragon"));
            } else {
                particles.push(new Particle(this.x, this.y+this.h/2, [255,100,0], "dash")); 
            }
            if (this.jetpack === 30) { 
                let dropX = this.x + (40 * game_speed);
                platforms.push(new RectEntity(dropX - 100, 450, 1000, 20));
                last_plat_x = Math.max(last_plat_x, dropX + 900); 
            }
            if (this.jetpack < 10) this.vy += this.gravity;
        } else if (this.demon <= 0) this.vy += this.gravity;

        this.x+=vx; this.y+=this.vy; this.onGround=false; 
        for(let p of platforms) if(AABB(this,p)){ 
            if(this.vy>0 && this.y+this.h - this.vy <= p.y + 10){ this.y=p.y-this.h; this.vy=0; this.onGround=true; } 
        }

        for(let p of pads) if(p.active && AABB(this,p) && this.vy>=0){ this.jump(true); p.timer=15; }
        
        // Power Up Collection
        for(let i of items) if(i.active && AABB(this,i)){ 
            i.active=false;
            if(i.pType===0) this.jetpack=300; else if(i.pType===1) this.magnet=600; else if(i.pType===2) this.shield=true; else if(i.pType===3) this.angel=true; else if(i.pType===4) this.demon=600; 
            for(let k=0;k<20;k++) particles.push(new Particle(this.x+15, this.y+20, [255,255,255], "sparkle")); 
        }

        // Magnet Logic
        if (this.magnet > 0) {
            this.magnet--;
            if (this.skinName === "DRAGON WARRIOR" && frames%5===0) particles.push(new Particle(this.x+15, this.y+20, [255,215,0], "wave"));
            let pull = (item) => { let dx=(this.x+15)-(item.x+10); let dy=(this.y+20)-(item.y+10); if(dx*dx+dy*dy < 400000) { item.x+=dx*0.15; item.y+=dy*0.15; } };
            gems.forEach(pull); collect_shards.forEach(pull);
        }

        // Death & Shield/Angel Logic
        let dead = this.y > 650;
        if (this.iframes <= 0 && this.jetpack <= 0) {
            for (let h of hazards) if (h.active && AABB(this, h)) {
                if (this.shield) {
                    this.shield = false; h.active = false; this.iframes = 60;
                    for(let k=0;k<30;k++) particles.push(new Particle(this.x+15, this.y+20, [50,255,100], "star")); 
                } else dead = true;
            }
        }

        if (dead) {
            if (this.angel) {
                this.angel = false; this.y = 100; this.vy = -10; this.iframes = 120; dead = false;
                for(let k=0;k<50;k++) particles.push(new Particle(this.x+15, this.y+20, [255,215,0], "star")); 
                let dropX = this.x + (40 * game_speed);
                platforms.push(new RectEntity(dropX - 100, 450, 800, 20));
                last_plat_x = Math.max(last_plat_x, dropX + 700); 
            } else {
                state = "GAMEOVER";
                if (distance > saveData.high_score) { saveData.high_score = distance; syncToCloud(); }
            }
        }

        this.trail.push({x:this.x+this.w/2, y:this.y+this.h/2}); if(this.trail.length>12) this.trail.shift();
        
        // --- 20 UNIQUE PASSIVE VFX (Running) ---
        if(this.onGround && this.jetpack<=0 && Math.random()<0.3){ 
            let cx=this.x+15; let cy=this.y+this.h;
            switch(this.skinName) {
                case "Forest": particles.push(new Particle(cx, cy, [50,200,50], "leaf")); break;
                case "Sand": particles.push(new Particle(cx, cy, [210,180,140], "dust")); break;
                case "Sakura": particles.push(new Particle(cx, cy, [255,180,200], "leaf")); break;
                case "Slime": particles.push(new Particle(cx, cy, [100,255,50], "slime")); break;
                case "Ash": particles.push(new Particle(cx, cy, [80,80,80], "ash")); break;
                case "Glacier": particles.push(new Particle(cx, cy, [150,255,255], "snow")); break;
                case "Toxic": particles.push(new Particle(cx, cy, [180,255,0], "toxic")); break;
                default: particles.push(new Particle(cx, cy, [150,150,150], "dust")); break;
            }
        }
        
        // Always-on Ambient VFX
        if (Math.random() < 0.2) {
            let cx = this.x+15; let cy = this.y+20;
            switch(this.skinName) {
                case "Amethyst": particles.push(new Particle(cx+rand(-10,10), cy+rand(-10,10), [150,50,255], "sparkle")); break;
                case "Bloodmoon": particles.push(new Particle(cx+rand(-10,10), cy+rand(-10,10), [200,30,30], "blood")); break;
                case "Phantom": particles.push(new Particle(cx+rand(-10,10), cy+rand(-10,10), [200,220,255], "ghost")); break;
                case "Plasma": particles.push(new Particle(cx+rand(-15,15), cy+rand(-15,15), [255,50,150], "plasma")); break;
                case "Solar": particles.push(new Particle(cx+rand(-10,10), cy+rand(-10,10), [255,150,0], "solar")); break;
                case "Void": particles.push(new Particle(cx+rand(-15,15), cy+rand(-15,15), [40,0,60], "void")); break;
                case "INFERNO": particles.push(new Particle(cx+rand(-10,10), this.y+this.h-rand(0,20), [255,50,0], "fire")); break;
                case "DRAGON WARRIOR": 
                    let oX = Math.cos(frames*0.1)*30; let oY = Math.sin(frames*0.1)*30;
                    particles.push(new Particle(cx+oX, cy+oY, [255,215,0], "sparkle")); break;
            }
        }
    }
    
    draw(ctx) {
        if (this.iframes > 0 && frames % 4 < 2) return; 
        drawKnightModel(ctx, this.x+15, this.y+20, this, true, frames, this);
    }
}

function drawStaticSkin(ctx, cx, cy, skin, isUnlocked, scale=1) {
    ctx.save(); ctx.translate(cx, cy); ctx.scale(scale, scale);
    if (!isUnlocked) {
        ctx.fillStyle = "#1a1a24"; ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-15, 23); ctx.lineTo(15, 23); ctx.fill();
        ctx.fillStyle = "#202030"; ctx.beginPath(); ctx.arc(0, -8, 11, 0, Math.PI*2); ctx.fill();
        drawText("?", 0, -2, 20, "#505064"); drawText("LOCKED", 0, 40, 10, "#505064"); ctx.restore(); return;
    }
    drawKnightModel(ctx, 0, 0, skin, false, frames, null);
    ctx.restore();
}

function drawBackground() {
    let cycle = (distance % 5000) / 5000; 
    let rTop, gTop, bTop, rBot, gBot, bBot;
    if (cycle < 0.25) { 
        rTop = 10+(cycle*4*40); gTop = 10+(cycle*4*20); bTop = 30-(cycle*4*10); rBot = 20+(cycle*4*100); gBot = 20+(cycle*4*40); bBot = 40+(cycle*4*10);
    } else if (cycle < 0.5) { 
        let p = (cycle-0.25)*4; rTop = 50-(p*30); gTop = 30+(p*100); bTop = 20+(p*200); rBot = 120-(p*50); gBot = 60+(p*100); bBot = 50+(p*200);
    } else if (cycle < 0.75) { 
        let p = (cycle-0.5)*4; rTop = 20+(p*80); gTop = 130-(p*80); bTop = 220-(p*180); rBot = 70+(p*150); gBot = 160-(p*100); bBot = 250-(p*200);
    } else { 
        let p = (cycle-0.75)*4; rTop = 100-(p*90); gTop = 50-(p*40); bTop = 40-(p*10); rBot = 220-(p*200); gBot = 60-(p*40); bBot = 50-(p*10);
    }
    let grad = ctx.createLinearGradient(0,0,0,600); grad.addColorStop(0, `rgb(${rTop},${gTop},${bTop})`); grad.addColorStop(1, `rgb(${rBot},${gBot},${bBot})`);
    ctx.fillStyle = grad; ctx.fillRect(0,0,900,600);

    ctx.fillStyle = "#1a1a24"; ctx.beginPath();
    for(let i=0; i<15; i++) { let px = (i*180) - ((camera_x*0.1) % 180); ctx.lineTo(px, 350 - Math.sin(i*99)*120); }
    ctx.lineTo(900, 600); ctx.lineTo(0, 600); ctx.fill();

    for(let b of bg_buildings) {
        let drawX = b.x - (camera_x * 0.3);
        if (drawX > -100 && drawX < 1000) {
            ctx.fillStyle = "#101018"; ctx.fillRect(drawX, b.y, b.w, 600-b.y);
            if (b.w > 40) { ctx.fillStyle = "#00ffc8"; ctx.fillRect(drawX+10, b.y+20, 5, 10); ctx.fillStyle = "#ff00ff"; ctx.fillRect(drawX+25, b.y+50, 5, 10); }
        }
    }
    
    for(let b of bg_props) {
        let drawX = b.x - (camera_x * 0.6);
        if (drawX > -100 && drawX < 1000) {
            if (b.type === "tree") {
                ctx.fillStyle = "#142814"; ctx.fillRect(drawX, b.y-100, 20, 100);
                ctx.fillStyle = "#0f3c0f"; ctx.beginPath(); ctx.moveTo(drawX+10, b.y-140); ctx.lineTo(drawX-20, b.y-60); ctx.lineTo(drawX+40, b.y-60); ctx.fill();
            } else {
                ctx.fillStyle = "#141419"; ctx.fillRect(drawX, b.y-150, 60, 150);
                ctx.fillStyle = "#00ffc8"; ctx.fillRect(drawX+10, b.y-140, 10, 20); ctx.fillRect(drawX+40, b.y-100, 10, 20);
            }
        }
    }
}

function generateChunk(lX, lY) {
    let cX=lX; let cY=lY; let np=Math.floor(rand(5,8));
    for(let i=0;i<np;i++){
        let gap = rand(90, 170); 
        cX+=gap; cY=Math.max(200, Math.min(500, cY+rand(-60,60))); let pW=rand(200,500); 
        platforms.push(new RectEntity(cX, cY, pW, 20));

        if(Math.random()<0.35){
            let aY=Math.max(100, cY-rand(120,150)); platforms.push(new RectEntity(cX+50, aY, pW-50, 20));
            pads.push(new JumpPad(cX+20, cY));
        }

        bg_props.push({x: cX+rand(0, pW-50), y: cY, type: Math.random()>0.5?"tree":"pillar"});
        if(Math.random()<0.4) bg_buildings.push({x: cX*0.5 + rand(0,300), y: rand(200, 350), w: rand(40, 80)}); 

        let r=Math.random(); 
        if(r<0.12) items.push(new PowerUp(cX+pW/2, cY-70, Math.floor(rand(0, 5)))); 
        else if(r<0.25) hazards.push(new Hazard(cX+pW/2, cY)); 
        else if(r<0.65) for(let j=0;j<Math.floor(rand(1,5));j++) gems.push(new Gem(cX+pW/2+(j*30), cY-35));
        else if(r<0.80) collect_shards.push(new ShardDrop(cX+pW/2, cY-40)); 
        
        cX+=pW;
    }
    last_plat_x=cX; last_plat_y=cY;
}

let dramaType = "none"; 
function rollGacha() {
    let r = Math.random(); let pool = [];
    if (r > 0.99) { pool = SKINS.filter(s => s.rarity === "Legendary"); dramaType = "ascension"; }
    else if (r > 0.91) { pool = SKINS.filter(s => s.rarity === "Epic"); dramaType = Math.random() > 0.5 ? "heartbreaker" : "none"; }
    else if (r > 0.60) { pool = SKINS.filter(s => s.rarity === "Rare"); dramaType = "none"; }
    else { pool = SKINS.filter(s => s.rarity === "Common"); dramaType = "none"; }
    return pool[Math.floor(Math.random() * pool.length)];
}

const player = new Player(); const preview = new Player();

function handleCanvasClick(mx, my) {
    if (state === "LOGIN") return;

    if (state === "MENU") {
        if (showBanner) { showBanner=false; return; } 
        if (isBtn(mx, my, 350, 180, 200, 70) || mx === -1) { 
            state = "PLAYING"; player.x=150; player.y=300; player.vy=0; player.dashTimer=0; player.trail=[]; player.shield=false; player.angel=false; player.magnet=0; player.demon=0;
            platforms=[new RectEntity(0,400,1200,20)]; gems=[]; items=[]; collect_shards=[]; hazards=[]; pads=[]; bg_props=[]; bg_buildings=[]; particles=[];
            last_plat_x=1200; last_plat_y=400; camera_x=0; distance=0; game_speed=5; 
        }
        else if (isBtn(mx, my, 350, 260, 95, 60)) state = "VAULT";
        else if (isBtn(mx, my, 455, 260, 95, 60)) state = "GACHA_MENU";
        else if (isBtn(mx, my, 350, 330, 200, 50)) { state = "SHARD_MENU"; shard_sel = 0; }
    } 
    else if (state === "PLAYING") {
        player.jump(); 
    }
    else if (state === "GAMEOVER") {
        if (isBtn(mx, my, 250, 420, 180, 60) || mx === -1) { 
            state = "PLAYING"; player.x=150; player.y=300; player.vy=0; player.dashTimer=0; player.trail=[]; player.shield=false; player.angel=false; player.magnet=0; player.demon=0;
            platforms=[new RectEntity(0,400,1200,20)]; gems=[]; items=[]; collect_shards=[]; hazards=[]; pads=[]; bg_props=[]; bg_buildings=[]; particles=[];
            last_plat_x=1200; last_plat_y=400; camera_x=0; distance=0; game_speed=5; 
        }
        else if (isBtn(mx, my, 470, 420, 180, 60)) { state = "MENU"; fetchLeaderboard(); }
    }
    else if (state === "VAULT") {
        if (isBtn(mx, my, 50, 30, 100, 40)) state = "MENU"; 
        let c = 5; let startX = 50; let startY = 140;
        for (let i = 0; i < SKINS.length; i++) {
            let x = startX + (i % c) * 82; let y = startY + Math.floor(i / c) * 95;
            if (isBtn(mx, my, x, y, 70, 80)) vault_sel = i;
        }
        if (isBtn(mx, my, 560, 480, 250, 50)) {
            if (saveData.unlocked.includes(SKINS[vault_sel].id) && saveData.equipped_id !== SKINS[vault_sel].id) {
                saveData.equipped_id = SKINS[vault_sel].id; player.updateSkin(); syncToCloud();
            }
        }
    }
    else if (state === "GACHA_MENU") {
        if (isBtn(mx, my, 50, 60, 100, 35)) { state = "MENU"; fetchLeaderboard(); }
        else if (isBtn(mx, my, 350, 420, 200, 50) || mx === -1) {
            if (saveData.gems >= GACHA_COST) {
                saveData.gems -= GACHA_COST; syncToCloud(); 
                gacha_target = rollGacha();
                preview.updateSkin(gacha_target.id); 
                state = "GACHA_ANIM"; gacha_timer = 240; gacha_return_state = "GACHA_MENU";
            }
        }
    }
    else if (state === "GACHA_RESULT") {
        if (isBtn(mx, my, 350, 520, 200, 50) || mx === -1) {
            state = gacha_return_state; 
            if (state === "MENU") fetchLeaderboard();
        }
    }
    else if (state === "SHARD_MENU") {
        if (isBtn(mx, my, 50, 60, 100, 35)) { state = "MENU"; fetchLeaderboard(); }
        else if (isBtn(mx, my, 280, 240, 50, 50)) shard_sel = (shard_sel + 3) % 4; 
        else if (isBtn(mx, my, 570, 240, 50, 50)) shard_sel = (shard_sel + 1) % 4; 
        else if (isBtn(mx, my, 350, 420, 200, 50) || mx === -1) {
            let r = SHARD_TIERS[shard_sel]; let cost = SHARD_PRICES[r];
            if (saveData.shards >= cost) {
                let missing = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id));
                if (missing.length > 0) {
                    saveData.shards -= cost; syncToCloud();
                    gacha_target = missing[Math.floor(Math.random() * missing.length)];
                    preview.updateSkin(gacha_target.id); 
                    state = "GACHA_ANIM"; gacha_timer = 240; gacha_return_state = "SHARD_MENU"; dramaType = "none";
                } else alert(`You already own all ${r} skins!`);
            } else alert(`Not enough Shards! You need ${cost}.`);
        }
    }
}

function getGachaColor(pct, drama, rarity) {
    let grey = [150,150,150], cyan = [0,255,255], red = [255,50,50], gold = [255,215,0];
    
    if (drama === "heartbreaker") {
        if(pct < 0.2) return grey;
        if(pct < 0.4) return lerpColor(grey, cyan, (pct-0.2)/0.2);
        if(pct < 0.6) return cyan;
        if(pct < 0.8) return lerpColor(cyan, red, (pct-0.6)/0.2);
        if(pct < 0.9) return red;
        if(pct < 0.95) return gold; 
        return red; 
    }
    
    let rLevel = rarity === "Common" ? 1 : rarity === "Rare" ? 2 : rarity === "Epic" ? 3 : 4;
    let targets = [grey];
    if (drama === "ascension" || rLevel >= 2) targets.push(cyan);
    if (drama === "ascension" || rLevel >= 3) targets.push(red);
    if (drama === "ascension" || rLevel >= 4) targets.push(gold);
    
    let segments = targets.length - 1;
    if (segments === 0) return grey;
    
    let segPct = pct * segments;
    let idx = Math.floor(segPct);
    if (idx >= segments) return targets[segments];
    return lerpColor(targets[idx], targets[idx+1], segPct - idx);
}

function update() {
    frames++; if (state === "LOGIN") return; 
    
    if (state === "PLAYING") {
        player.update(); game_speed += 0.001; 
        
        if (camera_x + 1800 > last_plat_x) generateChunk(last_plat_x, last_plat_y);

        platforms=platforms.filter(p=>p.x+p.w>camera_x-100); gems=gems.filter(g=>g.x+g.w>camera_x-100); collect_shards=collect_shards.filter(s=>s.x+s.w>camera_x-100);
        hazards=hazards.filter(h=>h.x+h.w>camera_x-100); pads=pads.filter(p=>p.x+p.w>camera_x-100); items=items.filter(i=>i.x+i.w>camera_x-100);
        bg_props=bg_props.filter(b=>b.x>camera_x-100); bg_buildings=bg_buildings.filter(b=>b.x>camera_x-300);

        let target_cam = player.x - 200; 
        camera_x += (target_cam - camera_x) * 0.1; camera_x = Math.max(0, camera_x);
        distance = Math.max(distance, Math.floor(player.x / 10));

    } else if (state === "GACHA_ANIM") {
        gacha_timer--;
        let pct = 1 - (gacha_timer / 240); 
        let col = getGachaColor(pct, dramaType, gacha_target.rarity);

        if (frames % 4 === 0) {
            if (col[0] > 200 && col[1] > 200) { 
                particles.push(new Particle(450+rand(-50,50), 300+rand(-50,50), col, "star"));
                particles.push(new Particle(450, 300, col, "wave")); 
            } else if (col[0] > 200 && col[1] < 100) { 
                particles.push(new Particle(450+rand(-30,30), 300+rand(-30,30), col, "normal"));
            }
        }

        if (gacha_timer <= 0) {
            for(let i=0;i<60;i++) particles.push(new Particle(450, 300, col));
            if (gacha_target.rarity === "Legendary") {
                for(let i=0;i<30;i++) particles.push(new Particle(450, 300, col, "star"));
                for(let i=0;i<5;i++) particles.push(new Particle(450, 300, col, "wave"));
            } else if (gacha_target.rarity === "Epic") {
                for(let i=0;i<3;i++) particles.push(new Particle(450, 300, col, "wave"));
            }

            if (saveData.unlocked.includes(gacha_target.id)) {
                gacha_msg="DUPLICATE"; shard_reward=gacha_target.rarity==="Common"?10:gacha_target.rarity==="Rare"?30:gacha_target.rarity==="Epic"?75:150; saveData.shards+=shard_reward;
            } else { gacha_msg="NEW SKIN!"; saveData.unlocked.push(gacha_target.id); }
            syncToCloud(); state = "GACHA_RESULT";
        }
    } else if (state === "MENU" || state === "GACHA_RESULT" || state === "VAULT") {
        if (frames % 20 === 0 && (player.skinName==="INFERNO" || player.skinName==="DRAGON WARRIOR")) {
            let col = player.skinName==="INFERNO"?[255,50,0]:[255,215,0];
            particles.push(new Particle(player.x+15+rand(-10,10), player.y+40, col, "fire"));
        }
    }
    particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);
}

function drawTopBar() {
    ctx.fillStyle = "rgba(10,10,15,0.8)"; ctx.fillRect(0, 0, 900, 50);
    drawText(`💎 ${saveData.gems}`, 20, 32, 22, "#00ffc8", "left"); 
    drawText(`🔮 ${saveData.shards}`, 160, 32, 22, "#c832ff", "left");
    drawText(`ID: ${currentPlayerId}`, 880, 32, 16, "#888", "right");
}

function draw() {
    if (state === "LOGIN") return; 
    ctx.fillStyle = "#030305"; ctx.fillRect(0, 0, 900, 600); 

    if (state === "PLAYING" || state === "GAMEOVER") {
        drawBackground();
        ctx.save(); ctx.translate(-camera_x, 0);
        
        ctx.fillStyle="#101018"; ctx.strokeStyle="#00ffc8"; ctx.lineWidth=2;
        for (let p of platforms) { 
            ctx.fillRect(p.x, p.y, p.w, p.h); 
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.w, p.y); ctx.stroke(); 
        }
        for(let p of pads) p.draw(ctx); for(let h of hazards) h.draw(ctx); for(let i of items) i.draw(ctx); for(let g of gems) g.draw(ctx); for(let s of collect_shards) s.draw(ctx); for(let p of particles) p.draw(ctx);
        player.draw(ctx); ctx.restore();

        drawText(`DISTANCE: ${distance}m`, 450, 40, 24, "white", "center");
        drawText(`💎 ${saveData.gems}`, 20, 40, 24, "#00ffc8", "left"); 
        drawText(`🔮 ${saveData.shards}`, 20, 70, 20, "#c832ff", "left");

        if (state === "GAMEOVER") {
            ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,600);
            drawText("ELIMINATED", 450, 200, 54, "#ff3232"); drawText(`Final Distance: ${distance}m`, 450, 270, 28, "white"); drawText(`High Score: ${saveData.high_score}m`, 450, 310, 28, "#ffd700");
            
            drawButton(250, 420, 180, 60, "RESTART", "rgba(0,150,255,0.8)", "rgba(0,255,200,0.8)", "white");
            drawButton(470, 420, 180, 60, "MENU", "rgba(128,0,128,0.8)", "rgba(200,50,255,0.8)", "white");
        }
    } else if (state === "VAULT") {
        for(let p of particles) p.draw(ctx); 
        drawTopBar();
        drawPanel(30, 80, 450, 480, "SKIN COLLECTION");
        drawButton(30, 60, 100, 35, "◀ BACK", "rgba(50,50,60,0.8)", "rgba(80,80,90,0.8)", "white", 14);

        let c = 5; let startX = 50; let startY = 140;
        for (let i = 0; i < SKINS.length; i++) {
            let x = startX + (i % c) * 82; let y = startY + Math.floor(i / c) * 95;
            let isUnl = saveData.unlocked.includes(SKINS[i].id);
            ctx.fillStyle = vault_sel===i ? "rgba(0,255,200,0.2)" : "rgba(10, 10, 15, 0.8)"; 
            ctx.strokeStyle = saveData.equipped_id === SKINS[i].id ? "#00ffc8" : vault_sel===i ? "white" : isUnl ? RARITY_COLORS[SKINS[i].rarity] : "#202030"; 
            ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(x, y, 70, 80, 8); ctx.fill(); ctx.stroke();
            drawStaticSkin(ctx, x+35, y+45, SKINS[i], isUnl, 1.0);
        }

        let s = SKINS[vault_sel]; let isUnl = saveData.unlocked.includes(s.id);
        drawPanel(500, 80, 370, 480, "INSPECTION");
        drawText(isUnl ? s.name : "???", 685, 170, 32, isUnl ? RARITY_COLORS[s.rarity] : "#505064");
        drawText(isUnl ? s.rarity.toUpperCase() : "LOCKED", 685, 200, 18, isUnl ? RARITY_COLORS[s.rarity] : "#505064");
        
        drawStaticSkin(ctx, 685, 340, s, isUnl, 3.0);

        if (isUnl) {
            if (saveData.equipped_id === s.id) drawButton(560, 480, 250, 50, "IN USE", "rgba(50,50,60,0.8)", "rgba(80,80,90,0.8)", "#aaaaaa");
            else drawButton(560, 480, 250, 50, "EQUIP SKIN", "rgba(0,150,255,0.8)", "rgba(0,255,200,0.8)", "white", 20, true);
        } else {
            drawButton(560, 480, 250, 50, "LOCKED", "rgba(20,20,25,0.8)", "rgba(40,40,50,0.8)", "#505064");
        }

    } else if (state === "MENU") {
        for (let p of particles) p.draw(ctx);
        drawKnightModel(ctx, 215, 360, player, true, frames, null); 
        drawTopBar();

        drawText("CRYSTAL JUMPER", 450, 120, 54, "#c8c8ff");
        drawText(`Equipped: ${player.skinName}`, 215, 490, 20, `rgb(${player.color.join(",")})`);
        
        drawButton(350, 220, 200, 70, "▶ PLAY", "rgba(0,150,255,0.8)", "rgba(0,255,200,0.8)", "white", 28, true);
        drawButton(350, 310, 95, 60, "VAULT", "rgba(128,0,128,0.8)", "rgba(200,50,255,0.8)", "white", 16);
        drawButton(455, 310, 95, 60, "GACHA", "rgba(180,150,0,0.8)", "rgba(255,215,0,0.8)", "white", 16);
        drawButton(350, 385, 200, 50, "SHARD SHOP", "rgba(150,0,0,0.8)", "rgba(255,50,50,0.8)", "white", 18);

        drawPanel(660, 200, 210, 250, "LEADERBOARD");
        if (leaderboardData.length === 0) drawText("Loading...", 765, 300, 14, "#aaaaaa");
        else {
            for(let i=0; i<leaderboardData.length; i++) {
                let f = leaderboardData[i]; let col = f.name === currentPlayerId ? "#00ffc8" : "white";
                drawText(`${i+1}.${f.name}`, 680, 270 + (i*35), 14, col, "left"); drawText(`${f.score}m`, 850, 270 + (i*35), 14, col, "right");
            }
        }

        if (showBanner) {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,600);
            drawText("🔥 NEW SKIN ALERT 🔥", 450, 150, 48, "#ffd700");
            drawText("DRAGON WARRIOR", 450, 200, 36, "#ff6400");
            drawStaticSkin(ctx, 450, 350, SKINS[19], true, 3.0);
            particles.push(new Particle(450+Math.cos(frames*0.1)*60, 350+Math.sin(frames*0.1)*60, [255,215,0], "star"));
            
            drawText("TAP ANYWHERE TO CLOSE", 450, 520, 18, "#aaaaaa");
        }

    } else if (state === "SHARD_MENU") {
        drawTopBar();
        drawButton(50, 60, 100, 35, "◀ BACK", "rgba(50,50,60,0.8)", "rgba(80,80,90,0.8)", "white", 14);
        drawPanel(250, 100, 400, 400, "SHARD EXCHANGE");

        const T = ["Common", "Rare", "Epic", "Legendary"]; let r = T[shard_sel]; let cost = SHARD_PRICES[r]; let col = RARITY_COLORS[r];
        
        drawButton(280, 240, 50, 50, "◀", "rgba(30,30,40,0.8)", "rgba(60,60,80,0.8)", "white");
        drawText(r.toUpperCase() + " TIER", 450, 275, 36, col);
        drawButton(570, 240, 50, 50, "▶", "rgba(30,30,40,0.8)", "rgba(60,60,80,0.8)", "white");

        drawText(`Cost: ${cost} Shards`, 450, 340, 20, "white");
        let missing = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id)).length;
        drawText(`Missing Skins: ${missing}`, 450, 380, 18, missing > 0 ? "#32c850" : "#ff3232");

        drawButton(350, 420, 200, 50, "PURCHASE", "rgba(0,150,255,0.8)", "rgba(0,255,200,0.8)", "white", 20, true);

    } else if (state === "GACHA_MENU") {
        drawTopBar();
        drawButton(50, 60, 100, 35, "◀ BACK", "rgba(50,50,60,0.8)", "rgba(80,80,90,0.8)", "white", 14);
        drawPanel(250, 100, 400, 400, "GACHA TEMPLE");
        
        // Pedestal
        ctx.fillStyle = "rgba(30,30,40,0.8)"; ctx.beginPath(); ctx.ellipse(450, 350, 80, 20, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(20,20,30,0.8)"; ctx.fillRect(410, 350, 80, 80);
        ctx.fillStyle = "rgba(0,255,200,0.2)"; ctx.beginPath(); ctx.ellipse(450, 350, 60, 10, 0, 0, Math.PI*2); ctx.fill();
        
        // Orb
        ctx.fillStyle = "rgba(100,100,150,0.8)"; ctx.beginPath(); ctx.arc(450, 280, 40, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(450, 280, 20, 0, Math.PI*2); ctx.fill();

        drawText(`Cost: ${GACHA_COST} Gems`, 450, 180, 20, "white");
        drawButton(350, 420, 200, 50, "SUMMON", "rgba(128,0,128,0.8)", "rgba(200,50,255,0.8)", "white", 24, true);

    } else if (state === "GACHA_ANIM") {
        let pct = 1 - (gacha_timer / 240); 
        let col = getGachaColor(pct, dramaType, gacha_target.rarity);

        ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},0.1)`; ctx.beginPath(); ctx.arc(450, 300, 100 + pct*200, 0, Math.PI*2); ctx.fill(); // Glow
        ctx.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`; ctx.beginPath(); ctx.arc(450, 300, 40 + pct*40, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(450, 300, 20 + pct*20, 0, Math.PI*2); ctx.fill(); 
        
        for(let p of particles) p.draw(ctx);
        drawText("SUMMONING...", 450, 100, 48, "white"); 

    } else if (state === "GACHA_RESULT") {
        drawBackground(); // Nice background for result
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,900,600);
        for(let p of particles) p.draw(ctx);
        
        let col = RARITY_COLORS[gacha_target.rarity];
        drawText(`PULLED: ${gacha_target.name}`, 450, 120, 48, col); drawText(`Rarity: ${gacha_target.rarity}`, 450, 170, 24, col);
        
        drawStaticSkin(ctx, 450, 320, gacha_target, true, 4.0); // MASSIVE PREVIEW

        if (gacha_msg === "DUPLICATE") { drawText("DUPLICATE DETECTED", 450, 450, 24, "#ff3232"); drawText(`Converted to +${shard_reward} Shards`, 450, 480, 24, "#ffd700"); }
        else drawText("NEW SKIN UNLOCKED!", 450, 460, 24, "#00ffc8");
        
        drawButton(350, 520, 200, 50, "CONTINUE", "rgba(30,30,40,0.8)", "rgba(60,60,80,0.8)", "white");
    }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
