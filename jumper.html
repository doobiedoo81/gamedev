<script>
// ==========================================

const firebaseConfig = {

};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentPlayerId = null;
let saveData = null; 
let leaderboardData = [];

async function fetchCloudData(username) {
    try {
        const docRef = db.collection("players").doc(username);
        const doc = await docRef.get();
        if (doc.exists) return doc.data();
        else return { gems: 15000, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 };
    } catch (error) {
        console.error("Firebase Error:", error);
        return { gems: 15000, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 };
    }
}

function syncToCloud() {
    if (!currentPlayerId) return;
    db.collection("players").doc(currentPlayerId).set(saveData, { merge: true }).catch(e => console.error(e));
}

async function fetchLeaderboard() {
    try {
        const snapshot = await db.collection("players").orderBy("high_score", "desc").limit(5).get();
        leaderboardData = [];
        snapshot.forEach(doc => leaderboardData.push({ name: doc.id, score: doc.data().high_score || 0 }));
    } catch (e) { console.error(e); }
}

function attemptLogin() {
    let idInput = document.getElementById("player-id").value.trim().toLowerCase();
    if (idInput === "") return alert("Please enter a Player ID!");
    document.querySelector(".login-btn").style.display = "none";
    document.getElementById("loading-text").style.display = "block";
    fetchCloudData(idInput).then(data => {
        currentPlayerId = idInput; saveData = data;
        fetchLeaderboard().then(() => {
            document.getElementById("login-overlay").style.display = "none";
            player.updateSkin(); state = "MENU";
        });
    });
}

// ==========================================
// 2. GAME ENGINE SETUP
// ==========================================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let isMobile = window.matchMedia("(max-width: 800px), (hover: none) and (pointer: coarse)").matches;
window.addEventListener("resize", () => { isMobile = window.matchMedia("(max-width: 800px), (hover: none) and (pointer: coarse)").matches; });

const keyPresses = {};
window.addEventListener("keydown", e => { if (!keyPresses[e.code]) { keyPresses[e.code] = true; handleStateInput(e.code); }});
window.addEventListener("keyup", e => { keyPresses[e.code] = false; });
function bindBtn(id, code) {
    const btn = document.getElementById(id);
    const d = (e) => { e.preventDefault(); if (!keyPresses[code]) { keyPresses[code] = true; handleStateInput(code); } };
    const u = (e) => { e.preventDefault(); keyPresses[code] = false; };
    btn.addEventListener("touchstart", d); btn.addEventListener("touchend", u);
    btn.addEventListener("mousedown", d); btn.addEventListener("mouseup", u);
}
bindBtn("btn-left", "ArrowLeft"); bindBtn("btn-right", "ArrowRight");
bindBtn("btn-jump", "Space"); bindBtn("btn-menu", "KeyM"); 
bindBtn("btn-gacha", "KeyG"); bindBtn("btn-collect", "KeyC"); 
bindBtn("btn-skin", "KeyE"); bindBtn("btn-shards", "KeyS");

// --- Game Data & NEW Rarities ---
const GACHA_COST = 50; 
const SHARD_PRICES = { "Common": 300, "Rare": 800, "Epic": 2000, "Legendary": 5000 };
const SHARD_TIERS = ["Common", "Rare", "Epic", "Legendary"];
let shard_sel = 0; // Tracks which rarity we are currently trying to buy in the Shard Menu

const SKINS = [
    { id: 0, name: "Squire", color: [150, 150, 160], rarity: "Starter" },
    { id: 1, name: "Forest", color: [50, 200, 80], rarity: "Common" },
    { id: 2, name: "Sand", color: [210, 180, 140], rarity: "Common" },
    { id: 3, name: "Ocean", color: [50, 150, 255], rarity: "Rare" },
    { id: 4, name: "Sakura", color: [255, 180, 200], rarity: "Rare" },
    { id: 5, name: "Amethyst", color: [150, 50, 255], rarity: "Epic" },
    { id: 6, name: "Bloodmoon", color: [200, 30, 30], rarity: "Epic" },
    { id: 7, name: "Neon", color: [255, 0, 255], rarity: "Epic" },
    { id: 8, name: "INFERNO", color: [255, 80, 0], rarity: "Legendary" },
    { id: 9, name: "GALAXY", color: [20, 0, 50], rarity: "Legendary" },
    { id: 10, name: "ABYSSAL", color: [0, 255, 255], rarity: "Legendary" },
    { id: 11, name: "CHRONO", color: [255, 255, 255], rarity: "Legendary" }
];
const RARITY_COLORS = { "Starter": "#9696a0", "Common": "#32c850", "Rare": "#0096ff", "Epic": "#c832ff", "Legendary": "#ffd700" };

let state = "LOGIN"; 
let platforms = [], gems = [], hazards = [], pads = [], orbs = [], particles = [];
let camera_x = 0, last_plat_x = 800, last_plat_y = 400, distance = 0;
let gacha_target = null, gacha_timer = 0, gacha_msg = "", shard_reward = 0;
let frames = 0;

function rand(min, max) { return Math.random() * (max - min) + min; }
function drawText(text, x, y, size, color, align="center") { ctx.fillStyle = color; ctx.font = `bold ${size}px Arial`; ctx.textAlign = align; ctx.fillText(text, x, y); }
function AABB(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

// --- VFX Engine ---
class Particle {
    constructor(x, y, color, type="normal") {
        this.x=x; this.y=y; this.color=color; this.type=type; this.life=255; this.size=4;
        if(type==="dust"){ this.dx=rand(-1,1); this.dy=rand(-2,0); this.life=150; this.size=rand(2,4); }
        else if(type==="fire"){ this.dx=rand(-1,1); this.dy=rand(-4,-1); this.life=200; this.size=rand(3,6); }
        else if(type==="dash"){ this.dx=rand(-5,-2); this.dy=rand(-1,1); this.life=255; this.size=5; }
        else if(type==="bubble"){ this.dx=rand(-1,1); this.dy=rand(-3,-1); this.life=200; this.size=rand(2,5); }
        else if(type==="leaf"){ this.dx=rand(-2,2); this.dy=rand(0,2); this.life=200; this.size=rand(3,5); }
        else if(type==="shockwave"){ this.dx=0; this.dy=0; this.life=255; this.radius=5; }
        else{ let a=rand(0,Math.PI*2); let s=rand(2,6); this.dx=Math.cos(a)*s; this.dy=Math.sin(a)*s; }
    }
    update() {
        this.x+=this.dx; this.y+=this.dy;
        if(this.type==="fire"){ this.life-=12; this.size=Math.max(0.1,this.size-0.1); }
        else if(this.type==="bubble"||this.type==="leaf"){ this.life-=8; this.x+=Math.sin(frames*0.1)*1; }
        else if(this.type==="shockwave"){ this.life-=15; this.radius+=3; } else this.life-=10;
    }
    draw(ctx) {
        if(this.life<=0)return; ctx.save();
        if(this.type==="shockwave"){
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.strokeStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.lineWidth=2; ctx.stroke();
        } else if (this.type==="bubble") {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            ctx.strokeStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.lineWidth=1; ctx.stroke();
        } else if (this.type==="leaf") {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        } else {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        } ctx.restore();
    }
}

class RectEntity { constructor(x,y,w,h) { this.x=x; this.y=y; this.w=w; this.h=h; this.active=true; } }
class Gem extends RectEntity {
    constructor(x,y){ super(x,y,20,20); this.pulse=rand(0,Math.PI*2); }
    draw(ctx){ if(!this.active)return; this.pulse+=0.1; let dy=this.y+10+Math.sin(this.pulse)*5; ctx.fillStyle="#00ffc8"; ctx.beginPath(); ctx.arc(this.x+10,dy,10,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x+10,dy,5,0,Math.PI*2); ctx.fill(); }
}
class Hazard extends RectEntity {
    constructor(x,y){ super(x,y-25,25,25); }
    draw(ctx){ if(!this.active)return; ctx.fillStyle="#ff3232"; ctx.strokeStyle="#640000"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(this.x, this.y+this.h); ctx.lineTo(this.x+this.w, this.y+this.h); ctx.lineTo(this.x+this.w/2, this.y); ctx.closePath(); ctx.fill(); ctx.stroke(); }
}
class JumpPad extends RectEntity {
    constructor(x,y){ super(x,y-15,30,15); this.timer=0; }
    draw(ctx){ if(!this.active)return; let h=this.timer>0?25:15; if(this.timer>0)this.timer--; let dy=this.y+this.h-h; ctx.fillStyle="#32ff64"; ctx.strokeStyle="white"; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(this.x+15,dy+h/2,15,h/2,0,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
}
class DashOrb extends RectEntity {
    constructor(x,y){ super(x,y,24,24); this.pulse=0; }
    draw(ctx){ if(!this.active)return; this.pulse+=0.15; let r=12+Math.sin(this.pulse)*4; let dy=this.y+12+Math.sin(this.pulse)*5; ctx.fillStyle="#0096ff"; ctx.beginPath(); ctx.arc(this.x+12,dy,r,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#c8f0ff"; ctx.beginPath(); ctx.arc(this.x+12,dy,r*0.5,0,Math.PI*2); ctx.fill(); }
}

class Player {
    constructor() { this.x=100; this.y=300; this.w=30; this.h=40; this.vx=0; this.vy=0; this.speed=6; this.gravity=0.6; this.jumpPower=-12; this.onGround=false; this.facingRight=true; this.dashTimer=0; this.trail=[]; }
    updateSkin(forceId=null) {
        if(!saveData) return;
        let id = forceId !== null ? forceId : saveData.equipped_id;
        let s = SKINS.find(x => x.id === id); this.skinName=s.name; this.color=s.color; this.rarity=s.rarity;
    }
    jump(superJump=false) {
        this.vy = superJump?-18:this.jumpPower; this.onGround=false;
        if(superJump) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [50,255,100], "shockwave"));
        
        switch(this.skinName) {
            case "Ocean": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,150,255], "shockwave")); for(let i=0;i<8;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,150,255], "bubble")); break;
            case "Forest": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [50,200,50], "leaf")); break;
            case "Sakura": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,180,200], "leaf")); break;
            case "Sand": for(let i=0;i<15;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [210,180,140], "dust")); break;
            case "Bloodmoon": for(let i=0;i<12;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [200,30,30], "dust")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [200,30,30], "shockwave")); break;
            case "Neon": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,255,255], "dash")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,0,255], "dash")); break;
            case "INFERNO": for(let i=0;i<15;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,100,0], "fire")); break;
            case "GALAXY": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [200,100,255], "normal")); break;
            case "ABYSSAL": particles.push(new Particle(this.x+this.w/2, this.y+this.h, [0,255,255], "shockwave")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,0,100], "shockwave")); break;
            case "CHRONO": for(let i=0;i<10;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,215,0], "normal")); particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,215,0], "shockwave")); break;
            default: particles.push(new Particle(this.x+this.w/2, this.y+this.h, [255,255,255], "shockwave")); break;
        }
    }
    update() {
        if(this.dashTimer>0){ this.dashTimer--; this.vx=14; this.vy=0; particles.push(new Particle(this.x, this.y+this.h/2, [0,150,255], "dash")); if(this.dashTimer===0)this.vx=this.speed; }
        else {
            if(keyPresses["ArrowLeft"]||keyPresses["KeyA"]){ this.vx=-this.speed; this.facingRight=false; } else if(keyPresses["ArrowRight"]||keyPresses["KeyD"]){ this.vx=this.speed; this.facingRight=true; } else this.vx=0;
            this.vy+=this.gravity;
        }
        if((keyPresses["ArrowUp"]||keyPresses["Space"]||keyPresses["KeyW"]) && this.onGround && this.dashTimer===0) this.jump();

        this.x+=this.vx; for(let p of platforms) if(AABB(this,p)){ if(this.vx>0)this.x=p.x-this.w; else if(this.vx<0)this.x=p.x+p.w; }
        this.y+=this.vy; this.onGround=false; for(let p of platforms) if(AABB(this,p)){ if(this.vy>0){ this.y=p.y-this.h; this.vy=0; this.onGround=true; } else if(this.vy<0){ this.y=p.y+p.h; this.vy=0; } }

        for(let p of pads) if(p.active && AABB(this,p) && this.vy>=0){ this.jump(true); p.timer=15; }
        for(let o of orbs) if(o.active && AABB(this,o)){ o.active=false; this.dashTimer=60; for(let i=0;i<20;i++) particles.push(new Particle(this.x+this.w/2, this.y+this.h/2, [0,200,255])); }

        this.trail.push({x:this.x+this.w/2, y:this.y+this.h/2}); if(this.trail.length>12) this.trail.shift();
        
        if (Math.random() < 0.4) {
            switch(this.skinName) {
                case "INFERNO": particles.push(new Particle(this.x+this.w/2+rand(-10,10), this.y+this.h-rand(0,20), [255,50,0], "fire")); break;
                case "Ocean": particles.push(new Particle(this.x+this.w/2+rand(-10,10), this.y+this.h, [0,150,255], "bubble")); break;
                case "Forest": particles.push(new Particle(this.x+this.w/2+rand(-10,10), this.y+this.h-10, [50,200,50], "leaf")); break;
                case "Sakura": particles.push(new Particle(this.x+this.w/2+rand(-10,10), this.y+this.h-10, [255,180,200], "leaf")); break;
                case "Bloodmoon": particles.push(new Particle(this.x+this.w/2+rand(-10,10), this.y+this.h-5, [200,30,30], "dust")); break;
            }
        }
        if(this.onGround && this.vx!==0 && Math.random()<0.3 && this.dashTimer===0){ 
            let c=this.skinName==="Sand"?[210,180,140]:[150,150,150]; particles.push(new Particle(this.facingRight?this.x:this.x+this.w, this.y+this.h, c, "dust")); 
        }
    }
    draw(ctx) {
        let cx=this.x+this.w/2;
        
        if(this.rarity === "Epic" || this.rarity === "Legendary"){
            for(let i=0;i<this.trail.length;i++){
                let t=this.trail[i]; let s=12*(i/this.trail.length);
                let col = this.skinName==="GALAXY"?`rgba(200,0,255,${i/this.trail.length})`:
                          this.skinName==="ABYSSAL"?`rgba(0,255,255,${i/this.trail.length})`:
                          this.skinName==="CHRONO"?`rgba(255,215,0,${i/this.trail.length})`:
                          this.skinName==="Neon"?(i%2===0?`rgba(0,255,255,${i/this.trail.length})`:`rgba(255,0,255,${i/this.trail.length})`):
                          `rgba(${this.color[0]},${this.color[1]},${this.color[2]},${i/this.trail.length})`;
                ctx.fillStyle=col; ctx.beginPath(); ctx.arc(t.x, t.y, s, 0, Math.PI*2); ctx.fill();
            }
        }

        if(this.dashTimer>0){ ctx.strokeStyle="#0096ff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx, this.y+this.h/2, 35, 0, Math.PI*2); ctx.stroke(); }
        
        if (this.rarity === "Epic" || this.rarity === "Legendary") {
            let aura_surf = document.createElement('canvas'); aura_surf.width=80; aura_surf.height=80; let actx=aura_surf.getContext('2d');
            let acolor = this.skinName==="GALAXY"?[100,0,200]:this.skinName==="ABYSSAL"?[0,150,150]:this.skinName==="CHRONO"?[200,180,50]:this.color;
            let intensity = this.rarity==="Epic" ? 15 : 30; 
            let glow = Math.abs(Math.sin(Date.now()/150)) * (this.rarity==="Epic"?20:50);
            actx.fillStyle = `rgba(${acolor[0]},${acolor[1]},${acolor[2]}, ${intensity/255})`;
            actx.beginPath(); actx.arc(40, 40, intensity + (glow/5), 0, Math.PI*2); actx.fill();
            ctx.drawImage(aura_surf, cx-40, this.y+this.h/2-40);
        }

        ctx.beginPath(); ctx.moveTo(cx, this.y+15); ctx.lineTo(cx-16, this.y+this.h-8); ctx.lineTo(cx+16, this.y+this.h-8); ctx.closePath();
        ctx.save(); ctx.clip();

        ctx.fillStyle=`rgb(${this.color[0]},${this.color[1]},${this.color[2]})`; ctx.fill();

        if (this.rarity === "Legendary") {
            if (this.skinName === "INFERNO") {
                let yOff = (frames * 2) % 20; ctx.fillStyle = "rgba(255, 200, 0, 0.5)";
                ctx.beginPath(); ctx.moveTo(cx-10, this.y+30-yOff); ctx.lineTo(cx, this.y+15-yOff); ctx.lineTo(cx+10, this.y+30-yOff); ctx.fill();
                ctx.beginPath(); ctx.moveTo(cx-15, this.y+40-yOff); ctx.lineTo(cx-5, this.y+25-yOff); ctx.lineTo(cx+5, this.y+40-yOff); ctx.fill();
            } else if (this.skinName === "GALAXY") {
                let yOff = (frames * 0.5) % 20; ctx.fillStyle = "white";
                ctx.fillRect(cx-5, this.y+10+yOff, 2, 2); ctx.fillRect(cx+8, this.y+20+yOff, 2, 2); ctx.fillRect(cx-10, this.y+30+yOff, 2, 2);
                ctx.fillRect(cx-5, this.y-10+yOff, 2, 2); ctx.fillRect(cx+8, this.y+yOff, 2, 2); ctx.fillRect(cx-10, this.y+10+yOff, 2, 2);
            } else if (this.skinName === "CHRONO") {
                let yOff = frames % 15; ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
                ctx.fillRect(cx-20, this.y+10+yOff, 40, 3); ctx.fillRect(cx-20, this.y+25+yOff, 40, 3); ctx.fillRect(cx-20, this.y-5+yOff, 40, 3);
            } else if (this.skinName === "ABYSSAL") {
                if (Math.random() < 0.3) {
                    ctx.fillStyle = "cyan"; ctx.fillRect(cx-20, this.y+20+rand(-5,5), 40, 2);
                    ctx.fillStyle = "magenta"; ctx.fillRect(cx-20, this.y+25+rand(-5,5), 40, 2);
                }
            }
        }
        ctx.restore(); 
        ctx.strokeStyle="#141419"; ctx.lineWidth=2; ctx.stroke();

        ctx.strokeStyle="#c8c8c8"; ctx.lineWidth=3; let off=(this.vx!==0&&this.onGround)?Math.sin(frames*0.5)*6:0; ctx.beginPath(); ctx.moveTo(cx-6, this.y+this.h-8); ctx.lineTo(cx-6+off, this.y+this.h); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+6, this.y+this.h-8); ctx.lineTo(cx+6-off, this.y+this.h); ctx.stroke();
        ctx.fillStyle="#f5f5fa"; ctx.beginPath(); ctx.ellipse(cx, this.y+10, 12, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle="#141419"; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx-8, this.y+14); ctx.lineTo(cx-12, this.y+4); ctx.lineTo(cx-4, this.y+10); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx+8, this.y+14); ctx.lineTo(cx+12, this.y+4); ctx.lineTo(cx+4, this.y+10); ctx.fill();
        
        let eOff=this.facingRight?3:-3; ctx.fillStyle=this.skinName==="INFERNO"?"#ff6400":this.skinName==="ABYSSAL"?"#00ffff":"#141419"; ctx.beginPath(); ctx.ellipse(cx+eOff-3, this.y+12, 2, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx+eOff+3, this.y+12, 2, 4, 0, 0, Math.PI*2); ctx.fill();
    }
}

function drawStaticSkin(ctx, cx, cy, skin, isUnlocked) {
    let bottom = cy + 25, top = cy - 15;
    if (!isUnlocked) {
        ctx.fillStyle = "#1a1a24"; ctx.beginPath(); ctx.moveTo(cx, top+15); ctx.lineTo(cx-16, bottom-8); ctx.lineTo(cx+16, bottom-8); ctx.fill();
        ctx.fillStyle = "#202030"; ctx.beginPath(); ctx.ellipse(cx, top+10, 12, 10, 0, 0, Math.PI*2); ctx.fill();
        drawText("?", cx, top+16, 20, "#505064"); drawText("LOCKED", cx, bottom+15, 12, "#505064"); return;
    }
    
    let c = skin.color;
    if (skin.rarity === "Legendary" || skin.rarity === "Epic") {
        ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]}, ${skin.rarity==="Legendary"?0.15:0.05})`;
        ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI*2); ctx.fill();
    }

    ctx.beginPath(); ctx.moveTo(cx, top+15); ctx.lineTo(cx-16, bottom-8); ctx.lineTo(cx+16, bottom-8); ctx.closePath();
    ctx.save(); ctx.clip();
    ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`; ctx.fill();

    if (skin.rarity === "Legendary") {
        if (skin.name === "INFERNO") {
            let yOff = (frames * 2) % 20; ctx.fillStyle = "rgba(255, 200, 0, 0.5)";
            ctx.beginPath(); ctx.moveTo(cx-10, top+30-yOff); ctx.lineTo(cx, top+15-yOff); ctx.lineTo(cx+10, top+30-yOff); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx-15, top+40-yOff); ctx.lineTo(cx-5, top+25-yOff); ctx.lineTo(cx+5, top+40-yOff); ctx.fill();
        } else if (skin.name === "GALAXY") {
            let yOff = (frames * 0.5) % 20; ctx.fillStyle = "white";
            ctx.fillRect(cx-5, top+10+yOff, 2, 2); ctx.fillRect(cx+8, top+20+yOff, 2, 2); ctx.fillRect(cx-10, top+30+yOff, 2, 2);
            ctx.fillRect(cx-5, top-10+yOff, 2, 2); ctx.fillRect(cx+8, top+yOff, 2, 2); ctx.fillRect(cx-10, top+10+yOff, 2, 2);
        } else if (skin.name === "CHRONO") {
            let yOff = frames % 15; ctx.fillStyle = "rgba(255, 215, 0, 0.6)";
            ctx.fillRect(cx-20, top+10+yOff, 40, 3); ctx.fillRect(cx-20, top+25+yOff, 40, 3); ctx.fillRect(cx-20, top-5+yOff, 40, 3);
        } else if (skin.name === "ABYSSAL") {
            if (Math.random() < 0.3) { ctx.fillStyle = "cyan"; ctx.fillRect(cx-20, top+20+rand(-5,5), 40, 2); ctx.fillStyle = "magenta"; ctx.fillRect(cx-20, top+25+rand(-5,5), 40, 2); }
        }
    }
    ctx.restore();
    ctx.strokeStyle = "#141419"; ctx.lineWidth = 2; ctx.stroke();

    ctx.fillStyle = "#f5f5fa"; ctx.beginPath(); ctx.ellipse(cx, top+10, 12, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-8, top+14); ctx.lineTo(cx-12, top+4); ctx.lineTo(cx-4, top+10); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+8, top+14); ctx.lineTo(cx+12, top+4); ctx.lineTo(cx+4, top+10); ctx.fill();
    
    ctx.fillStyle = skin.name==="INFERNO"?"#ff6400":skin.name==="ABYSSAL"?"#00ffff":"#141419";
    ctx.beginPath(); ctx.ellipse(cx-3, top+12, 2, 4, 0, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(cx+3, top+12, 2, 4, 0, 0, Math.PI*2); ctx.fill();
    
    drawText(skin.name, cx, bottom+15, 14, `rgb(${c[0]},${c[1]},${c[2]})`);
    ctx.fillStyle = RARITY_COLORS[skin.rarity]; ctx.beginPath(); ctx.arc(cx, bottom+25, 3, 0, Math.PI*2); ctx.fill();
}

function generateChunk(lX, lY) {
    let cX=lX; let cY=lY; let np=Math.floor(rand(3,6));
    for(let i=0;i<np;i++){
        cX+=rand(70,160); cY=Math.max(200, Math.min(500, cY+rand(-60,60))); let pW=rand(200,400); platforms.push(new RectEntity(cX, cY, pW, 20));
        if(Math.random()<0.3){
            let aY=Math.max(100, cY-rand(120,160)); platforms.push(new RectEntity(cX+50, aY, pW-50, 20));
            if(Math.random()<0.4) orbs.push(new DashOrb(cX+pW/2, aY-40)); else for(let j=0;j<3;j++) gems.push(new Gem(cX+80+(j*40), aY-35));
            pads.push(new JumpPad(cX+30, cY));
        }
        let r=Math.random(); if(r<0.1) orbs.push(new DashOrb(cX+pW/2, cY-40)); else if(r<0.3) hazards.push(new Hazard(cX+pW/2, cY)); else if(r<0.7) for(let j=0;j<Math.floor(rand(1,4));j++) gems.push(new Gem(cX+pW/2+(j*30), cY-35));
        cX+=pW;
    }
    last_plat_x=cX; last_plat_y=cY;
}

function rollGacha() {
    let roll = Math.random();
    if (roll > 0.99) return SKINS.filter(s => s.rarity === "Legendary")[Math.floor(Math.random()*4)];
    if (roll > 0.91) return SKINS.filter(s => s.rarity === "Epic")[Math.floor(Math.random()*3)];
    if (roll > 0.60) return SKINS.filter(s => s.rarity === "Rare")[Math.floor(Math.random()*2)];
    return SKINS.filter(s => s.rarity === "Common")[Math.floor(Math.random()*2)];
}

const player = new Player(); const preview = new Player();

function handleStateInput(code) {
    if (state === "LOGIN") return; 
    if (state === "MENU") {
        if (code === "Enter" || code === "Space") {
            state = "PLAYING"; player.x=100; player.y=300; player.vy=0; player.dashTimer=0; player.trail=[];
            platforms=[new RectEntity(0,400,800,20)]; gems=[]; hazards=[]; pads=[]; orbs=[]; last_plat_x=800; last_plat_y=400; camera_x=0; distance=0;
        } else if (code === "KeyG") state = "GACHA_MENU";
        else if (code === "KeyC") state = "COLLECTION"; 
        else if (code === "ArrowRight" || code === "KeyE") { 
            if (saveData.unlocked.length > 0) {
                let idx = saveData.unlocked.indexOf(saveData.equipped_id);
                saveData.equipped_id = saveData.unlocked[(idx + 1) % saveData.unlocked.length];
                player.updateSkin(); syncToCloud(); 
            }
        } else if (code === "KeyS") {
            state = "SHARD_MENU"; shard_sel = 0;
        }
    } else if (state === "COLLECTION") {
        if (code === "Escape" || code === "KeyC" || code === "KeyM" || code === "Space") state = "MENU";
    } else if (state === "SHARD_MENU") {
        if (code === "Escape" || code === "KeyM" || code === "KeyS") { state = "MENU"; fetchLeaderboard(); }
        else if (code === "ArrowLeft") { shard_sel = (shard_sel + 3) % 4; }
        else if (code === "ArrowRight") { shard_sel = (shard_sel + 1) % 4; }
        else if (code === "Enter" || code === "Space") {
            let r = SHARD_TIERS[shard_sel];
            let cost = SHARD_PRICES[r];
            if (saveData.shards >= cost) {
                let missing = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id));
                if (missing.length > 0) {
                    saveData.shards -= cost; syncToCloud();
                    gacha_target = missing[Math.floor(Math.random() * missing.length)];
                    preview.updateSkin(gacha_target.id); preview.x = 400 - 15; preview.y = 280;
                    state = "GACHA_ANIM"; gacha_timer = 180;
                } else {
                    alert(`You already own all ${r} skins!`);
                }
            } else {
                alert(`Not enough Shards! You need ${cost}.`);
            }
        }
    } else if (state === "GACHA_MENU") {
        if (code === "Escape" || code === "KeyM") { state = "MENU"; fetchLeaderboard(); } 
        else if (code === "Space" && saveData.gems >= GACHA_COST) {
            saveData.gems -= GACHA_COST; syncToCloud(); 
            gacha_target = rollGacha();
            preview.updateSkin(gacha_target.id); preview.x=400-15; preview.y=280; state="GACHA_ANIM"; gacha_timer=180;
        }
    } else if (state === "GACHA_RESULT") { if (code === "Space") state = "GACHA_MENU"; }
    else if (state === "PLAYING" && (code === "Escape" || code === "KeyM")) { state = "MENU"; fetchLeaderboard(); }
    else if (state === "GAMEOVER") { if (code === "Space" || code === "KeyR") handleStateInput("Enter"); else if (code === "KeyM") { state = "MENU"; fetchLeaderboard(); } }
}

function update() {
    frames++;
    if (state === "LOGIN") return; 
    
    if (state === "PLAYING") {
        player.update();
        if (camera_x + 1600 > last_plat_x) generateChunk(last_plat_x, last_plat_y);

        platforms=platforms.filter(p=>p.x+p.w>camera_x-400); gems=gems.filter(g=>g.x+g.w>camera_x-400); hazards=hazards.filter(h=>h.x+h.w>camera_x-400); pads=pads.filter(p=>p.x+p.w>camera_x-400); orbs=orbs.filter(o=>o.x+o.w>camera_x-400);
        camera_x += (player.x - 266 - camera_x) * 0.1; camera_x = Math.max(0, camera_x);
        distance = Math.max(distance, Math.floor(player.x / 10));

        let dead = player.y > 600;
        if (player.dashTimer === 0) for (let h of hazards) if (h.active && AABB(player, h)) dead = true;

        if (dead) {
            state = "GAMEOVER";
            if (distance > saveData.high_score) { saveData.high_score = distance; syncToCloud(); }
            keyPresses["ArrowLeft"]=false; keyPresses["ArrowRight"]=false;
        }

        for (let g of gems) if (g.active && AABB(player, g)) { 
            g.active=false; saveData.gems+=5; syncToCloud(); 
            for(let i=0;i<5;i++) particles.push(new Particle(g.x+10,g.y+10,[0,255,200])); 
        }
    } else if (state === "GACHA_ANIM") {
        gacha_timer--;
        if (gacha_timer <= 0) {
            let c=gacha_target.color; for(let i=0;i<50;i++) particles.push(new Particle(400, 300, c));
            if (saveData.unlocked.includes(gacha_target.id)) {
                gacha_msg="DUPLICATE"; shard_reward=gacha_target.rarity==="Common"?10:gacha_target.rarity==="Rare"?20:gacha_target.rarity==="Epic"?40:150; saveData.shards+=shard_reward;
            } else { gacha_msg="NEW SKIN!"; saveData.unlocked.push(gacha_target.id); }
            syncToCloud(); state = "GACHA_RESULT";
        }
    } else if (state === "MENU" || state === "GACHA_RESULT" || state === "COLLECTION") {
        if (frames % 20 === 0 && (player.skinName==="INFERNO" || preview.skinName==="INFERNO")) {
            let p = state==="MENU"?player:preview; particles.push(new Particle(p.x+15+rand(-10,10), p.y+40, [255,50,0], "fire"));
        }
    }
    particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);
}

function draw() {
    if (state === "LOGIN") return; 
    ctx.fillStyle = "#0f0f19"; ctx.fillRect(0, 0, 800, 600); 

    if (state === "PLAYING") {
        ctx.save(); ctx.translate(-camera_x, 0);
        ctx.fillStyle="#323246"; ctx.strokeStyle="#505064"; ctx.lineWidth=2;
        for (let p of platforms) { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeRect(p.x, p.y, p.w, p.h); }
        for(let p of pads) p.draw(ctx); for(let h of hazards) h.draw(ctx); for(let o of orbs) o.draw(ctx); for(let g of gems) g.draw(ctx); for(let p of particles) p.draw(ctx);
        player.draw(ctx); ctx.restore();
        drawText(`GEMS: ${saveData.gems}`, 20, 40, 24, "#00ffc8", "left"); drawText(`DISTANCE: ${distance}m`, 780, 40, 24, "white", "right");

    } else if (state === "GAMEOVER") {
        ctx.fillStyle="rgba(0,0,0,0.7)"; ctx.fillRect(0,0,800,600);
        drawText("ELIMINATED", 400, 250, 48, "#ff3232"); drawText(`Final Distance: ${distance}m`, 400, 300, 24, "white"); drawText(`High Score: ${saveData.high_score}m`, 400, 330, 24, "#ffd700");
        drawText(isMobile ? "Tap JUMP/OK to Restart" : "Press [ENTER] to Restart", 400, 400, 18, "#aaaaaa");

    } else if (state === "COLLECTION") {
        for(let p of particles) p.draw(ctx); 
        drawText("SKIN VAULT", 400, 60, 40, "#ffd700");
        let pct = Math.floor((saveData.unlocked.length / SKINS.length) * 100);
        drawText(`Completion: ${saveData.unlocked.length} / ${SKINS.length} (${pct}%)`, 400, 90, 16, "#aaaaaa");

        let cols = 4; let startX = 175; let startY = 170;
        for (let i = 0; i < SKINS.length; i++) {
            let x = startX + (i % cols) * 150; let y = startY + Math.floor(i / cols) * 120;
            ctx.fillStyle = "rgba(30, 30, 40, 0.5)"; ctx.strokeStyle = "#202030"; ctx.lineWidth = 2;
            if (saveData.equipped_id === SKINS[i].id) { ctx.strokeStyle = "#00ffc8"; } 
            ctx.fillRect(x - 50, y - 50, 100, 100); ctx.strokeRect(x - 50, y - 50, 100, 100);
            drawStaticSkin(ctx, x, y, SKINS[i], saveData.unlocked.includes(SKINS[i].id));
        }
        drawText(isMobile ? "Tap VAULT(C) to return" : "Press [C] or [ESC] to return", 400, 560, 18, "#aaaaaa");

    } else if (state === "SHARD_MENU") {
        drawText("SHARD EXCHANGE", 400, 100, 48, "#ffd700");
        drawText(`Wallet: ${saveData.shards} Shards`, 400, 160, 24, "#00ffc8");

        let r = SHARD_TIERS[shard_sel];
        let cost = SHARD_PRICES[r];
        let col = RARITY_COLORS[r];
        
        drawText("◀", 250, 300, 32, "white");
        drawText(r.toUpperCase() + " SKIN", 400, 300, 32, col);
        drawText("▶", 550, 300, 32, "white");

        drawText(`Cost: ${cost} Shards`, 400, 360, 24, "white");

        let missingCount = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id)).length;
        drawText(`Missing: ${missingCount}`, 400, 400, 18, missingCount > 0 ? "#32c850" : "#ff3232");

        drawText(isMobile ? "Tap JUMP/OK to Purchase" : "Press [SPACE] to Purchase", 400, 480, 24, "white");
        drawText(isMobile ? "Tap SHARD SHOP to Return" : "Press [S] or [ESC] to Return", 400, 550, 18, "#aaaaaa");

    } else if (state === "MENU") {
        for (let p of particles) p.draw(ctx);
        player.x = 250 - 15; player.y = 350; player.draw(ctx); 

        drawText("CRYSTAL JUMPER", 400, 100, 40, "#c8c8ff");
        drawText(isMobile ? "Tap JUMP/OK to Run" : "Press [ENTER] to Run", 250, 200, 24, "white");
        drawText(isMobile ? "Tap GACHA to enter Temple" : "Press [G] to enter Gacha", 250, 250, 24, "#ffd700");
        drawText(isMobile ? "Tap VAULT to view Skins" : "Press [C] for Collection", 250, 300, 24, "#c832ff");
        
        drawText(`Gems: ${saveData.gems} | Shards: ${saveData.shards}`, 250, 350, 18, "#00ffc8");
        drawText(isMobile ? `Tap SHARD SHOP to exchange Shards` : `Press [S] to open Shard Exchange`, 250, 400, 16, "#ff3264");

        drawText(`ID: [${currentPlayerId}]`, 250, 450, 16, "#aaaaaa");
        drawText(`Equipped: ${player.skinName}`, 250, 480, 24, `rgb(${player.color.join(",")})`);
        
        ctx.fillStyle = "rgba(20, 20, 30, 0.8)"; ctx.strokeStyle = "#505064"; ctx.fillRect(500, 180, 250, 300); ctx.strokeRect(500, 180, 250, 300);
        drawText("GLOBAL LEADERBOARD", 625, 220, 18, "#ffd700");
        
        if (leaderboardData.length === 0) drawText("Loading network...", 625, 320, 16, "#aaaaaa");
        else {
            for(let i=0; i<leaderboardData.length; i++) {
                let f = leaderboardData[i]; let col = f.name === currentPlayerId ? "#00ffc8" : "white";
                drawText(`${i+1}. ${f.name}`, 520, 270 + (i*40), 16, col, "left"); drawText(`${f.score}m`, 730, 270 + (i*40), 16, col, "right");
            }
        }
    } else if (state === "GACHA_MENU") {
        drawText("GACHA TEMPLE", 400, 100, 48, "#ffd700");
        drawText(`Cost: ${GACHA_COST} Gems | Wallet: ${saveData.gems} Gems`, 400, 180, 24, "#00ffc8");
        drawText(isMobile ? "Tap JUMP/OK to Pull" : "Press [SPACE] to Invoke Crystal", 400, 300, 24, "white");
    } else if (state === "GACHA_ANIM") {
        let pct = 1 - (gacha_timer / 180); let tCol = gacha_target.color;
        let r=200+(tCol[0]-200)*pct, g=200+(tCol[1]-200)*pct, b=200+(tCol[2]-200)*pct; let rad=20+(pct*40); let sx=rand(-5,5)*pct, sy=rand(-5,5)*pct;
        ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.beginPath(); ctx.arc(400+sx, 300+sy, rad, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(400+sx, 300+sy, rad/2, 0, Math.PI*2); ctx.fill(); drawText("SUMMONING...", 400, 100, 48, `rgb(${r},${g},${b})`);
    } else if (state === "GACHA_RESULT") {
        for(let p of particles) p.draw(ctx);
        let col = RARITY_COLORS[gacha_target.rarity];
        drawText(`PULLED: ${gacha_target.name}`, 400, 120, 48, col); drawText(`Rarity: ${gacha_target.rarity}`, 400, 170, 24, col);
        preview.draw(ctx);
        if (gacha_msg === "DUPLICATE") { drawText("DUPLICATE DETECTED", 400, 380, 24, "#ff3232"); drawText(`Converted to +${shard_reward} Shards`, 400, 420, 24, "#ffd700"); }
        else drawText("NEW SKIN UNLOCKED!", 400, 380, 24, "#00ffc8");
        drawText(isMobile ? "Tap JUMP/OK to Continue" : "Press [SPACE] to Continue", 400, 500, 18, "#aaaaaa");
    }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
