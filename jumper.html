<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal Jumper: Clean Performance Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        body { margin: 0; padding: 0; background-color: #050508; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; font-family: 'Arial', sans-serif;}
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;}
        canvas { 
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.1); 
            border-radius: 8px; 
            width: 100%; 
            max-width: 900px; 
            aspect-ratio: 900 / 600; 
            background: #000; 
            cursor: pointer; 
        }
        
        #login-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 8, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .login-box { background: #101014; padding: 40px; border-radius: 12px; border: 1px solid #00ffc8; text-align: center; width: 80%; max-width: 350px; }
        .login-box h2 { color: #ffd700; margin-top: 0; font-size: 26px; }
        .login-box input { width: 85%; padding: 12px; margin: 20px 0; border-radius: 6px; border: 1px solid #303040; background: #0a0a10; color: white; font-size: 16px; text-align: center; }
        .login-btn { background: #0096ff; color: white; border: none; padding: 15px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
        .login-btn:active { background: #00ffc8; color: black; }
        #loading-text { display: none; color: #00ffc8; margin-top: 15px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="login-overlay">
            <div class="login-box">
                <h2>SYSTEM LOGIN</h2>
                <p style="color:#888; font-size:14px;">Enter Player ID to load Cloud Save</p>
                <input type="text" id="player-id" placeholder="e.g., hero" autocomplete="off">
                <button class="login-btn" onclick="attemptLogin()">CONNECT</button>
                <div id="loading-text">Authenticating...</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="900" height="600"></canvas>
    </div>

<script>
// ==========================================
// 1. FIREBASE CONFIGURATION
// ==========================================
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyByVbuwJaBaOdghTMSbxvG2WEZhbDsVvkM",
  authDomain: "jumper-2882b.firebaseapp.com",
  projectId: "jumper-2882b",
  storageBucket: "jumper-2882b.firebasestorage.app",
  messagingSenderId: "852548137714",
  appId: "1:852548137714:web:8005960f02970829b8966b",
  measurementId: "G-5WK2XBQTBV"
};


firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentPlayerId = null; let saveData = null; let leaderboardData = [];

async function fetchCloudData(username) {
    try {
        const doc = await db.collection("players").doc(username).get();
        if (doc.exists) return doc.data();
        else return { gems: 1500, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 };
    } catch (e) { return { gems: 1500, shards: 0, unlocked: [0], equipped_id: 0, high_score: 0 }; }
}
function syncToCloud() { if (currentPlayerId) db.collection("players").doc(currentPlayerId).set(saveData, { merge: true }); }
async function fetchLeaderboard() {
    try {
        const snap = await db.collection("players").orderBy("high_score", "desc").limit(5).get();
        leaderboardData = []; snap.forEach(doc => leaderboardData.push({ name: doc.id, score: doc.data().high_score || 0 }));
    } catch (e) {}
}

function attemptLogin() {
    let idInput = document.getElementById("player-id").value.trim().toLowerCase();
    if (idInput === "") return;
    document.querySelector(".login-btn").style.display = "none"; document.getElementById("loading-text").style.display = "block";
    fetchCloudData(idInput).then(data => {
        currentPlayerId = idInput; saveData = data;
        fetchLeaderboard().then(() => {
            document.getElementById("login-overlay").style.display = "none";
            player.updateSkin(); state = "MENU";
        });
    });
}

// ==========================================
// 2. CORE ENGINE
// ==========================================
const canvas = document.getElementById("gameCanvas"); const ctx = canvas.getContext("2d");
let frames = 0; let state = "LOGIN"; let isPointerDown = false;

function getMousePos(evt) {
    let rect = canvas.getBoundingClientRect();
    let scaleX = canvas.width / rect.width; let scaleY = canvas.height / rect.height;
    let cx = evt.clientX !== undefined ? evt.clientX : evt.touches[0].clientX;
    let cy = evt.clientY !== undefined ? evt.clientY : evt.touches[0].clientY;
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
}
canvas.addEventListener("pointerdown", (e) => { isPointerDown = true; let pos = getMousePos(e); handleCanvasClick(pos.x, pos.y); });
canvas.addEventListener("pointerup", () => { isPointerDown = false; });
window.addEventListener("keydown", (e) => { if(e.code==="Space"||e.code==="ArrowUp") { isPointerDown=true; handleCanvasClick(-1,-1); }});
window.addEventListener("keyup", (e) => { if(e.code==="Space"||e.code==="ArrowUp") isPointerDown=false; });

function isBtn(mx, my, bx, by, bw, bh) { return mx >= bx && mx <= bx+bw && my >= by && my <= by+bh; }
function drawText(txt, x, y, size, col, align="center") { ctx.fillStyle=col; ctx.font=`bold ${size}px Arial`; ctx.textAlign=align; ctx.fillText(txt, x, y); }
function drawButton(x, y, w, h, text, col1, col2, txtCol="white", txtSize=20) {
    ctx.fillStyle = col1; ctx.beginPath(); ctx.roundRect(x,y,w,h, 8); ctx.fill();
    ctx.strokeStyle = col2; ctx.lineWidth = 2; ctx.stroke();
    drawText(text, x+w/2, y+h/2+txtSize*0.35, txtSize, txtCol);
}

// Optimization: Leaner Data
const GACHA_COST = 50; 
const SHARD_PRICES = { "Common": 300, "Rare": 800, "Epic": 2000, "Legendary": 5000 };
const SHARD_TIERS = ["Common", "Rare", "Epic", "Legendary"];
const SKINS = [
    { id: 0, name: "Squire", color: [150, 150, 160], rarity: "Starter" },
    { id: 1, name: "Forest", color: [50, 200, 80], rarity: "Common" },
    { id: 2, name: "Sand", color: [210, 180, 140], rarity: "Common" },
    { id: 3, name: "Ocean", color: [50, 150, 255], rarity: "Common" },
    { id: 4, name: "Sakura", color: [255, 180, 200], rarity: "Common" },
    { id: 5, name: "Slime", color: [100, 255, 50], rarity: "Common" },
    { id: 6, name: "Ash", color: [80, 80, 80], rarity: "Common" },
    { id: 7, name: "Amethyst", color: [150, 50, 255], rarity: "Rare" },
    { id: 8, name: "Glacier", color: [150, 255, 255], rarity: "Rare" },
    { id: 9, name: "Toxic", color: [180, 255, 0], rarity: "Rare" },
    { id: 10, name: "Bloodmoon", color: [200, 30, 30], rarity: "Epic" },
    { id: 11, name: "Neon", color: [255, 0, 255], rarity: "Epic" },
    { id: 12, name: "Phantom", color: [200, 220, 255], rarity: "Epic" },
    { id: 13, name: "Plasma", color: [255, 50, 150], rarity: "Epic" },
    { id: 14, name: "Solar", color: [255, 150, 0], rarity: "Epic" },
    { id: 15, name: "Void", color: [20, 20, 20], rarity: "Epic" },
    { id: 16, name: "INFERNO", color: [255, 50, 0], rarity: "Legendary" },
    { id: 17, name: "GALAXY", color: [20, 0, 50], rarity: "Legendary" },
    { id: 18, name: "ABYSSAL", color: [0, 255, 255], rarity: "Legendary" },
    { id: 19, name: "DRAGON WARRIOR", color: [255, 215, 0], rarity: "Legendary" }
];
const RARITY_COLORS = { "Starter": "#aaaaaa", "Common": "#aaaaaa", "Rare": "#00ffff", "Epic": "#ff3232", "Legendary": "#ffd700" };

let platforms=[], gems=[], items=[], shards=[], hazards=[], pads=[], particles=[];
let camera_x=0, last_plat_x=900, last_plat_y=400, distance=0, game_speed=6;
let gacha_target=null, gacha_timer=0, gacha_msg="", shard_reward=0, vault_sel=0, shard_sel=0, gacha_return="MENU";

// Simplified VFX Engine for Performance
class Particle {
    constructor(x, y, color, type="normal") {
        this.x=x; this.y=y; this.color=color; this.type=type; this.life=255; this.size=Math.random()*3+2;
        this.dx=(Math.random()-0.5)*6; this.dy=(Math.random()-0.5)*6;
        if(type==="fly"){ this.dx=(Math.random()-1)*8; this.dy=(Math.random()-0.5)*2; this.size=6; }
        if(type==="wave"){ this.dx=0; this.dy=0; this.radius=5; }
    }
    update() {
        this.x+=this.dx; this.y+=this.dy;
        if(this.type==="wave"){ this.radius+=8; this.life-=15; }
        else this.life-=12;
    }
    draw(ctx) {
        if(this.life<=0)return; 
        if(this.type==="wave"){
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.strokeStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`; ctx.lineWidth=3; ctx.stroke();
        } else {
            ctx.fillStyle=`rgba(${this.color[0]},${this.color[1]},${this.color[2]},${this.life/255})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
}

class Rect { constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;this.active=true;} }
function AABB(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

class Player {
    constructor() { this.x=150; this.y=300; this.w=30; this.h=40; this.vy=0; this.gravity=0.6; this.jumpPower=-13; this.onGround=false; this.updateSkin(); 
    this.jetpack=0; this.magnet=0; this.shield=false; this.angel=false; this.demon=0; this.iframes=0; }
    updateSkin(fId=null) {
        if(!saveData) return; let id=fId!==null?fId:saveData.equipped_id; let s=SKINS.find(x=>x.id===id);
        this.skinName=s.name; this.color=s.color; this.rarity=s.rarity;
    }
    jump() { 
        if(!this.onGround) return; this.vy = this.jumpPower; this.onGround=false; 
        for(let i=0;i<5;i++) particles.push(new Particle(this.x+15, this.y+40, [255,255,255]));
    }
    update() {
        let vx = game_speed;
        if(this.iframes > 0) this.iframes--;

        if (this.demon > 0 && this.jetpack <= 0) {
            this.demon--;
            if (isPointerDown) { this.vy = -5; if(frames%3===0) particles.push(new Particle(this.x+15, this.y+20, [150,0,255], "fly")); } 
            else { this.vy += this.gravity * 0.4; }
        }

        if(this.jetpack>0){ 
            this.jetpack--; vx=18; this.y += (150 - this.y) * 0.1; this.vy = 0; this.magnet = 10;
            particles.push(new Particle(this.x, this.y+20, this.skinName==="DRAGON WARRIOR"?[255,215,0]:[255,100,0], "fly"));
            if (this.jetpack === 20) { platforms.push(new Rect(this.x+vx*20, 450, 1000, 20)); last_plat_x = this.x+vx*20+1000; }
            if (this.jetpack < 10) this.vy += this.gravity;
        } else if (this.demon <= 0) {
            this.vy += this.gravity;
        }

        this.x+=vx; this.y+=this.vy; this.onGround=false; 
        for(let p of platforms) if(AABB(this,p)){ if(this.vy>0 && this.y+this.h - this.vy <= p.y + 10){ this.y=p.y-this.h; this.vy=0; this.onGround=true; } }

        for(let p of pads) if(p.active && AABB(this,p) && this.vy>=0){ this.vy=-18; this.onGround=false; p.active=false; }
        
        for(let i of items) if(i.active && AABB(this,i)){ 
            i.active=false;
            if(i.type===0) this.jetpack=200; else if(i.type===1) this.magnet=400; else if(i.type===2) this.shield=true; else if(i.type===3) this.angel=true; else if(i.type===4) this.demon=400; 
        }

        if (this.magnet > 0) {
            this.magnet--;
            let pull = (item) => { let dx=(this.x+15)-(item.x+10); let dy=(this.y+20)-(item.y+10); if(dx*dx+dy*dy < 250000) { item.x+=dx*0.1; item.y+=dy*0.1; } };
            gems.forEach(pull); shards.forEach(pull);
        }

        let dead = this.y > 650;
        if (this.iframes <= 0 && this.jetpack <= 0) {
            for (let h of hazards) if (h.active && AABB(this, h)) {
                if (this.shield) { this.shield = false; h.active = false; this.iframes = 60; } else dead = true;
            }
        }

        if (dead) {
            if (this.angel) {
                this.angel = false; this.y = 100; this.vy = -10; this.iframes = 120; dead = false;
                platforms.push(new Rect(this.x, 450, 800, 20)); last_plat_x = Math.max(last_plat_x, this.x + 800); 
            } else {
                state = "GAMEOVER";
                if (distance > saveData.high_score) { saveData.high_score = distance; syncToCloud(); }
            }
        }
    }
    
    draw(ctx) {
        if (this.iframes > 0 && frames % 4 < 2) return; 
        let cx=this.x+15; let cy=this.y+20;
        
        if (this.demon > 0) {
            ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx-40, cy-10+Math.sin(frames*0.3)*10); ctx.lineTo(cx-10, cy+10); ctx.fill();
            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+40, cy-10+Math.sin(frames*0.3)*10); ctx.lineTo(cx+10, cy+10); ctx.fill();
        }

        ctx.fillStyle=`rgb(${this.color[0]},${this.color[1]},${this.color[2]})`;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        if (this.rarity === "Legendary") { ctx.strokeStyle="#ffd700"; ctx.lineWidth=2; ctx.strokeRect(this.x, this.y, this.w, this.h); }
        else if (this.rarity === "Epic") { ctx.strokeStyle="#ff3232"; ctx.lineWidth=2; ctx.strokeRect(this.x, this.y, this.w, this.h); }

        if (this.shield) { ctx.strokeStyle = "#32ff64"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx, cy, 35, 0, Math.PI*2); ctx.stroke(); }
        if (this.angel) { ctx.strokeStyle = "#ffd700"; ctx.lineWidth=4; ctx.beginPath(); ctx.ellipse(cx, this.y-10, 15, 5, 0, 0, Math.PI*2); ctx.stroke(); }
    }
}

// Clean Generator
function generateChunk(lX, lY) {
    let cX=lX; let cY=lY;
    for(let i=0;i<5;i++){
        cX+=Math.random()*80 + 100; cY=Math.max(200, Math.min(500, cY+(Math.random()-0.5)*120)); let pW=Math.random()*300+300; 
        platforms.push(new Rect(cX, cY, pW, 20));

        if(Math.random()<0.3){
            let aY=cY-130; platforms.push(new Rect(cX+50, aY, pW-50, 20));
            pads.push(new Rect(cX+20, cY-10, 40, 10));
        }

        let r=Math.random(); 
        if(r<0.1) items.push({x:cX+pW/2, y:cY-60, w:30, h:30, type:Math.floor(Math.random()*5), active:true}); 
        else if(r<0.3) hazards.push(new Rect(cX+pW/2, cY-30, 30, 30)); 
        else if(r<0.6) for(let j=0;j<3;j++) gems.push(new Rect(cX+pW/2+(j*40), cY-30, 20, 20));
        else if(r<0.7) shards.push(new Rect(cX+pW/2, cY-40, 20, 20)); 
        cX+=pW;
    }
    last_plat_x=cX; last_plat_y=cY;
}

const player = new Player(); const preview = new Player();

// --- Fast Input Router ---
function handleCanvasClick(mx, my) {
    if (state === "LOGIN") return;

    if (state === "MENU") {
        if (isBtn(mx, my, 350, 220, 200, 60) || mx === -1) { 
            state = "PLAYING"; player.x=150; player.y=300; player.vy=0; player.dashTimer=0; player.trail=[]; player.shield=false; player.angel=false; player.magnet=0; player.demon=0;
            platforms=[new Rect(0,400,1200,20)]; gems=[]; items=[]; shards=[]; hazards=[]; pads=[];
            last_plat_x=1200; last_plat_y=400; camera_x=0; distance=0; game_speed=6; 
        }
        else if (isBtn(mx, my, 350, 300, 95, 50)) state = "VAULT";
        else if (isBtn(mx, my, 455, 300, 95, 50)) state = "GACHA_MENU";
        else if (isBtn(mx, my, 350, 370, 200, 50)) { state = "SHARD_MENU"; shard_sel = 0; }
    } 
    else if (state === "PLAYING") { player.jump(); }
    else if (state === "GAMEOVER") {
        if (isBtn(mx, my, 250, 400, 180, 60) || mx === -1) { 
            state = "PLAYING"; player.x=150; player.y=300; player.vy=0; player.dashTimer=0; player.shield=false; player.angel=false; player.magnet=0; player.demon=0;
            platforms=[new Rect(0,400,1200,20)]; gems=[]; items=[]; shards=[]; hazards=[]; pads=[];
            last_plat_x=1200; last_plat_y=400; camera_x=0; distance=0; game_speed=6; 
        }
        else if (isBtn(mx, my, 470, 400, 180, 60)) { state = "MENU"; fetchLeaderboard(); }
    }
    else if (state === "VAULT") {
        if (isBtn(mx, my, 50, 30, 100, 40)) state = "MENU"; 
        for (let i=0; i<SKINS.length; i++) if (isBtn(mx, my, 50+(i%5)*80, 120+Math.floor(i/5)*90, 70, 80)) vault_sel = i;
        if (isBtn(mx, my, 550, 450, 250, 50) && saveData.unlocked.includes(SKINS[vault_sel].id)) {
            saveData.equipped_id = SKINS[vault_sel].id; player.updateSkin(); syncToCloud();
        }
    }
    else if (state === "GACHA_MENU") {
        if (isBtn(mx, my, 50, 30, 100, 40)) state = "MENU";
        else if (isBtn(mx, my, 350, 350, 200, 60) || mx === -1) {
            if (saveData.gems >= GACHA_COST) {
                saveData.gems -= GACHA_COST; syncToCloud(); 
                let r=Math.random(); let p=[];
                if(r>0.99)p=SKINS.filter(s=>s.rarity==="Legendary"); else if(r>0.91)p=SKINS.filter(s=>s.rarity==="Epic"); else if(r>0.6)p=SKINS.filter(s=>s.rarity==="Rare"); else p=SKINS.filter(s=>s.rarity==="Common");
                gacha_target = p[Math.floor(Math.random()*p.length)];
                preview.updateSkin(gacha_target.id); state = "GACHA_ANIM"; gacha_timer = 180; gacha_return = "GACHA_MENU";
            }
        }
    }
    else if (state === "SHARD_MENU") {
        if (isBtn(mx, my, 50, 30, 100, 40)) state = "MENU";
        else if (isBtn(mx, my, 250, 280, 50, 50)) shard_sel = (shard_sel + 3) % 4; 
        else if (isBtn(mx, my, 600, 280, 50, 50)) shard_sel = (shard_sel + 1) % 4; 
        else if (isBtn(mx, my, 350, 450, 200, 60) || mx === -1) {
            let r = SHARD_TIERS[shard_sel]; let cost = SHARD_PRICES[r];
            if (saveData.shards >= cost) {
                let m = SKINS.filter(s => s.rarity === r && !saveData.unlocked.includes(s.id));
                if (m.length > 0) {
                    saveData.shards -= cost; syncToCloud();
                    gacha_target = m[Math.floor(Math.random() * m.length)];
                    preview.updateSkin(gacha_target.id); state = "GACHA_ANIM"; gacha_timer = 180; gacha_return = "SHARD_MENU";
                } else alert(`You own all ${r} skins!`);
            } else alert(`Need ${cost} Shards!`);
        }
    }
    else if (state === "GACHA_RESULT") {
        if (isBtn(mx, my, 350, 500, 200, 50) || mx === -1) { state = gacha_return; if(state==="MENU") fetchLeaderboard(); }
    }
}

function update() {
    frames++; if (state === "LOGIN") return; 
    
    if (state === "PLAYING") {
        player.update(); game_speed += 0.002; 
        if (camera_x + 1800 > last_plat_x) generateChunk(last_plat_x, last_plat_y);

        platforms=platforms.filter(p=>p.x+p.w>camera_x-100); gems=gems.filter(g=>g.x>camera_x-100); shards=shards.filter(s=>s.x>camera_x-100);
        hazards=hazards.filter(h=>h.x>camera_x-100); pads=pads.filter(p=>p.x>camera_x-100); items=items.filter(i=>i.x>camera_x-100);

        camera_x += (player.x - 200 - camera_x) * 0.1; camera_x = Math.max(0, camera_x);
        distance = Math.max(distance, Math.floor(player.x / 10));

    } else if (state === "GACHA_ANIM") {
        gacha_timer--;
        if (gacha_timer <= 0) {
            if (saveData.unlocked.includes(gacha_target.id)) {
                gacha_msg="DUPLICATE"; shard_reward=gacha_target.rarity==="Common"?10:gacha_target.rarity==="Rare"?30:gacha_target.rarity==="Epic"?75:150; saveData.shards+=shard_reward;
            } else { gacha_msg="NEW SKIN!"; saveData.unlocked.push(gacha_target.id); }
            syncToCloud(); state = "GACHA_RESULT";
        }
    }
    particles.forEach(p=>p.update()); particles=particles.filter(p=>p.life>0);
}

function draw() {
    if (state === "LOGIN") return; 
    ctx.fillStyle = "#08080c"; ctx.fillRect(0, 0, 900, 600); 

    if (state === "PLAYING" || state === "GAMEOVER") {
        ctx.save(); ctx.translate(-camera_x, 0);
        
        ctx.fillStyle="#1a1a24"; platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
        
        pads.forEach(p => { if(p.active){ ctx.fillStyle="#32ff64"; ctx.fillRect(p.x,p.y,p.w,p.h); }});
        hazards.forEach(h => { if(h.active){ ctx.fillStyle="#ff3232"; ctx.beginPath(); ctx.moveTo(h.x,h.y+h.h); ctx.lineTo(h.x+h.w,h.y+h.h); ctx.lineTo(h.x+h.w/2,h.y); ctx.fill(); }});
        gems.forEach(g => { if(g.active){ ctx.fillStyle="#00ffc8"; ctx.fillRect(g.x, g.y+Math.sin(frames*0.1)*5, 15, 15); }});
        shards.forEach(s => { if(s.active){ ctx.fillStyle="#c832ff"; ctx.fillRect(s.x, s.y+Math.sin(frames*0.1)*5, 15, 15); }});
        
        items.forEach(i => {
            if(i.active) {
                let col = i.type===0?"#ff6400":i.type===1?"#0096ff":i.type===2?"#32ff64":i.type===3?"#ffd700":"#ff00ff";
                let em = i.type===0?"🚀":i.type===1?"🧲":i.type===2?"🛡️":i.type===3?"👼":"🦇";
                ctx.fillStyle=col; ctx.beginPath(); ctx.arc(i.x+15, i.y+15+Math.sin(frames*0.1)*5, 18, 0, Math.PI*2); ctx.fill();
                drawText(em, i.x+15, i.y+22+Math.sin(frames*0.1)*5, 20, "white");
            }
        });

        particles.forEach(p=>p.draw(ctx)); player.draw(ctx); ctx.restore();

        drawText(`GEMS: ${saveData.gems}`, 20, 40, 20, "#00ffc8", "left"); drawText(`SHARDS: ${saveData.shards}`, 20, 70, 20, "#c832ff", "left");
        drawText(`DISTANCE: ${distance}m`, 880, 40, 24, "white", "right");

        if (state === "GAMEOVER") {
            ctx.fillStyle="rgba(0,0,0,0.85)"; ctx.fillRect(0,0,900,600);
            drawText("ELIMINATED", 450, 200, 54, "#ff3232"); drawText(`Final Distance: ${distance}m`, 450, 260, 24, "white");
            drawButton(250, 400, 180, 60, "RESTART", "#202030", "#00ffc8", "white");
            drawButton(470, 400, 180, 60, "MENU", "#202030", "#c832ff", "white");
        }
    } else if (state === "VAULT") {
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16); drawText("SKIN VAULT", 450, 60, 40, "#ffd700");
        for (let i = 0; i < SKINS.length; i++) {
            let x = 50 + (i % 5) * 80; let y = 120 + Math.floor(i / 5) * 90;
            ctx.fillStyle = vault_sel===i ? "rgba(0,255,200,0.2)" : "#141419"; 
            ctx.strokeStyle = saveData.equipped_id === SKINS[i].id ? "#00ffc8" : vault_sel===i ? "white" : "#202030"; ctx.lineWidth = 2;
            ctx.fillRect(x, y, 70, 80); ctx.strokeRect(x, y, 70, 80);
            if (saveData.unlocked.includes(SKINS[i].id)) { ctx.fillStyle=`rgb(${SKINS[i].color})`; ctx.fillRect(x+20, y+20, 30, 40); } else drawText("?", x+35, y+50, 24, "#505064");
        }
        let s = SKINS[vault_sel]; let isUnl = saveData.unlocked.includes(s.id);
        ctx.fillStyle = "#101014"; ctx.fillRect(500, 120, 350, 400); ctx.strokeStyle="#303040"; ctx.strokeRect(500, 120, 350, 400);
        drawText(isUnl ? s.name : "???", 675, 180, 36, isUnl ? RARITY_COLORS[s.rarity] : "#505064"); drawText(isUnl ? s.rarity : "LOCKED", 675, 210, 20, isUnl ? RARITY_COLORS[s.rarity] : "#505064");
        if (isUnl) { ctx.fillStyle=`rgb(${s.color})`; ctx.fillRect(630, 260, 90, 120); }
        if (isUnl) drawButton(550, 430, 250, 50, saveData.equipped_id===s.id?"IN USE":"EQUIP", "#202030", saveData.equipped_id===s.id?"#505050":"#00ffc8", "white");
        else drawButton(550, 430, 250, 50, "LOCKED", "#101010", "#303030", "#505050");

    } else if (state === "MENU") {
        drawText("CRYSTAL JUMPER", 450, 100, 54, "#c8c8ff"); drawText(`Equipped: ${player.skinName}`, 180, 490, 20, `rgb(${player.color.join(",")})`);
        
        drawButton(350, 220, 200, 60, "▶ PLAY", "#0096ff", "#00ffc8", "black", 24);
        drawButton(350, 300, 95, 50, "VAULT", "#202030", "#c832ff", "white", 16);
        drawButton(455, 300, 95, 50, "GACHA", "#202030", "#ffd700", "white", 16);
        drawButton(350, 370, 200, 50, "SHARD SHOP", "#202030", "#ff3232", "white", 18);

        drawText(`Gems: ${saveData.gems}  |  Shards: ${saveData.shards}`, 450, 500, 18, "#00ffc8");

        ctx.fillStyle = "#101014"; ctx.fillRect(660, 200, 210, 250); ctx.strokeStyle="#303040"; ctx.strokeRect(660, 200, 210, 250);
        drawText("LEADERBOARD", 765, 230, 16, "#ffd700");
        if (leaderboardData.length > 0) leaderboardData.forEach((f,i) => { let col = f.name===currentPlayerId?"#00ffc8":"white"; drawText(`${i+1}.${f.name}`, 680, 270+(i*35), 14, col, "left"); drawText(`${f.score}m`, 850, 270+(i*35), 14, col, "right"); });

    } else if (state === "SHARD_MENU") {
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16); drawText("SHARD EXCHANGE", 450, 100, 48, "#ffd700"); 
        let r = SHARD_TIERS[shard_sel]; let cost = SHARD_PRICES[r];
        drawButton(250, 280, 50, 50, "◀", "#202030", "#404050", "white"); drawText(r.toUpperCase(), 450, 315, 36, RARITY_COLORS[r]); drawButton(600, 280, 50, 50, "▶", "#202030", "#404050", "white");
        drawText(`Cost: ${cost} Shards`, 450, 380, 20, "white");
        drawButton(350, 450, 200, 60, "PURCHASE", "#202030", "#00ffc8");

    } else if (state === "GACHA_MENU") {
        drawButton(50, 30, 100, 40, "◀ BACK", "#202030", "#303040", "white", 16); drawText("GACHA TEMPLE", 450, 150, 50, "#ffd700"); 
        drawText(`Cost: ${GACHA_COST} Gems`, 450, 230, 20, "white"); drawText(`Wallet: ${saveData.gems} Gems`, 450, 270, 20, "#00ffc8");
        drawButton(350, 350, 200, 60, "SUMMON", "#202030", "#c832ff", "white", 24);

    } else if (state === "GACHA_ANIM") {
        let pct = 1 - (gacha_timer / 180); 
        let col = [150,150,150]; if(gacha_target.rarity==="Rare") col=[0,255,255]; if(gacha_target.rarity==="Epic") col=[255,50,50]; if(gacha_target.rarity==="Legendary") col=[255,215,0];
        if (frames%5===0 && pct>0.5) particles.push(new Particle(450, 300, col, "wave"));
        ctx.fillStyle=`rgb(${col})`; ctx.beginPath(); ctx.arc(450, 300, 20+pct*40, 0, Math.PI*2); ctx.fill();
        particles.forEach(p=>p.draw(ctx)); drawText("SUMMONING...", 450, 100, 40, "white");

    } else if (state === "GACHA_RESULT") {
        particles.forEach(p=>p.draw(ctx)); drawText(`PULLED: ${gacha_target.name}`, 450, 150, 40, RARITY_COLORS[gacha_target.rarity]);
        ctx.fillStyle=`rgb(${gacha_target.color})`; ctx.fillRect(415, 250, 70, 100);
        drawText(gacha_msg, 450, 420, 20, "white"); drawButton(350, 500, 200, 50, "CONTINUE", "#202030", "#404050", "white");
    }
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
</body>
</html>
